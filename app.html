<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Smart Planner Pro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#F0F4FA;--bg2:#FFFFFF;--bg3:#F6F8FC;--bg4:#EDF1F7;
--card:#FFFFFF;
--accent:#4361EE;--accent2:#3A56D4;--accent-bg:rgba(67,97,238,.08);
--green:#10B981;--green-bg:rgba(16,185,129,.08);
--amber:#F59E0B;--amber-bg:rgba(245,158,11,.08);
--red:#EF4444;--red-bg:rgba(239,68,68,.08);
--cyan:#06B6D4;--cyan2:#0891B2;--cyan-bg:rgba(6,182,212,.08);
--purple:#8B5CF6;--purple2:#7C3AED;--purple-bg:rgba(139,92,246,.08);
--pink:#EC4899;--pink2:#DB2777;--pink-bg:rgba(236,72,153,.08);
--indigo:#6366F1;--indigo-bg:rgba(99,102,241,.08);
--text:#1E293B;--text2:#475569;--text3:#94A3B8;--text4:#CBD5E1;
--border:#E2E8F0;--border2:#CBD5E1;
--radius:14px;--radius-lg:20px;
--shadow-lg:0 8px 32px rgba(0,0,0,.1);
--font:'DM Sans',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace;
--gradient:linear-gradient(135deg,#4361EE,#7C3AED);
--gradient2:linear-gradient(135deg,#10B981,#06B6D4);
--gradient3:linear-gradient(135deg,#F59E0B,#EF4444);
--gradient4:linear-gradient(135deg,#EC4899,#8B5CF6);
}
html,body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased;line-height:1.5}
button{font-family:var(--font);cursor:pointer;transition:all .2s}
input,select,textarea{font-family:var(--font)}
button:active{transform:scale(.96)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:8px}
::selection{background:var(--accent);color:#fff}
.hdr{background:#FFFFFF;box-shadow:0 1px 3px rgba(0,0,0,.06);padding:0 32px;display:flex;align-items:center;height:64px;position:sticky;top:0;z-index:100;gap:16px;border-bottom:1px solid var(--border)}
.hdr-brand{display:flex;align-items:center;gap:12px;margin-right:auto}
.hdr-logo{width:38px;height:38px;border-radius:12px;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 12px rgba(67,97,238,.3)}
.hdr-brand h1{font-size:16px;font-weight:700}.hdr-brand small{color:var(--text3);font-size:11px}
.tabs{display:flex;height:64px;align-items:stretch;gap:2px;overflow-x:auto}
.tab{padding:0 14px;border:none;background:0;color:var(--text3);font-weight:500;font-size:13px;position:relative;display:flex;align-items:center;gap:6px;border-radius:10px 10px 0 0;white-space:nowrap}
.tab:hover{color:var(--text2);background:var(--bg)}
.tab.on{color:var(--accent);font-weight:700}
.tab.on::after{content:"";position:absolute;bottom:0;left:8px;right:8px;height:3px;background:var(--gradient);border-radius:3px 3px 0 0}
.tab .tab-icon{font-size:15px}
.add-b{height:38px;padding:0 18px;border-radius:12px;border:none;background:var(--gradient);color:#fff;font-weight:600;font-size:13px;display:flex;align-items:center;gap:6px;box-shadow:0 2px 10px rgba(67,97,238,.25)}
.add-b:hover{box-shadow:0 4px 16px rgba(67,97,238,.35);transform:translateY(-1px)}
.add-m{background:linear-gradient(135deg,#06B6D4,#0891B2);box-shadow:0 2px 10px rgba(6,182,212,.25)}
.add-r{background:linear-gradient(135deg,#8B5CF6,#7C3AED);box-shadow:0 2px 10px rgba(139,92,246,.25)}
.set-b{width:38px;height:38px;border-radius:12px;border:1px solid var(--border);background:var(--bg);color:var(--text3);font-size:16px;display:flex;align-items:center;justify-content:center}
.main{padding:28px 32px;max-width:1400px;margin:0 auto}
.card{background:var(--card);border-radius:var(--radius-lg);border:1px solid var(--border);padding:22px;transition:all .2s}
.card:hover{border-color:var(--border2)}
.stitle{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.kpi-r{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
.kpi{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:20px;position:relative;overflow:hidden;transition:all .3s}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.kpi-glow{position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.06;filter:blur(20px);pointer-events:none}
.kpi-l{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:1.2px}
.kpi-v{font-size:32px;font-weight:800;margin-top:6px;font-family:var(--mono);color:var(--accent)}
.kpi-s{font-size:11px;color:var(--text4);margin-top:4px}
.bdg{display:inline-flex;padding:3px 10px;border-radius:8px;font-size:11px;font-weight:600;white-space:nowrap}
.pw{position:relative;width:100%;height:8px;background:var(--bg4);border-radius:10px;cursor:pointer;overflow:hidden;transition:height .2s}
.pw:hover{height:14px}
.pf{height:100%;border-radius:10px;transition:width .3s}
.tr{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .25s}
.tr:hover{border-color:var(--accent);box-shadow:0 4px 20px rgba(67,97,238,.1);transform:translateY(-1px)}
.tr.done{opacity:.4}
.task-left{width:4px;align-self:stretch;border-radius:4px;flex-shrink:0}
.seg{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--card)}
.seg button{padding:8px 14px;border:none;background:transparent;color:var(--text3);font-size:12px;font-weight:600;border-right:1px solid var(--border)}
.seg button:last-child{border:none}
.seg button:hover{color:var(--text2);background:var(--bg)}
.seg button.on{background:var(--accent);color:#fff}
.seg-cyan button.on{background:var(--cyan2)}
.seg-purple button.on{background:var(--purple2)}
.mo{position:fixed;inset:0;background:rgba(30,41,59,.5);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(8px);animation:fi .2s}
.md{background:#FFF;border-radius:var(--radius-lg);width:min(640px,94vw);max-height:92vh;overflow:hidden;box-shadow:var(--shadow-lg);animation:su .25s;display:flex;flex-direction:column;border:1px solid var(--border)}
.mh{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg3)}
.mh h3{font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px}
.mb{padding:24px;overflow-y:auto;flex:1}
.mc{width:32px;height:32px;border-radius:10px;border:1px solid var(--border);background:#fff;font-size:18px;color:var(--text3);display:flex;align-items:center;justify-content:center}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1}}
.fl{display:flex;flex-direction:column;gap:6px}
.fl label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px}
.fl input,.fl select,.fl textarea{padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;color:var(--text);background:#fff;outline:none;width:100%;transition:all .2s}
.fl input:focus,.fl select:focus,.fl textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(67,97,238,.1)}
.fl textarea{resize:vertical;min-height:64px}
.bp{padding:12px 24px;border-radius:12px;border:none;background:var(--gradient);color:#fff;font-size:14px;font-weight:700;width:100%;box-shadow:0 2px 10px rgba(67,97,238,.25)}
.bp-cyan{background:linear-gradient(135deg,#06B6D4,#0891B2);box-shadow:0 2px 10px rgba(6,182,212,.25)}
.bp-purple{background:linear-gradient(135deg,#8B5CF6,#7C3AED);box-shadow:0 2px 10px rgba(139,92,246,.25)}
.bp-green{background:var(--gradient2);box-shadow:0 2px 10px rgba(16,185,129,.25)}
.bo{padding:8px 16px;border-radius:10px;border:1px solid var(--border);background:#fff;font-size:13px;font-weight:500;color:var(--text2)}
.bd{padding:8px 16px;border-radius:10px;border:1px solid var(--red-bg);background:var(--red-bg);font-size:13px;font-weight:600;color:var(--red)}
.bs{padding:12px 24px;border-radius:12px;border:none;background:var(--gradient2);color:#fff;font-size:14px;font-weight:700;box-shadow:0 2px 10px rgba(16,185,129,.25)}
.dp{position:fixed;right:0;top:0;bottom:0;width:min(480px,100vw);background:#fff;box-shadow:-4px 0 24px rgba(0,0,0,.08);z-index:999;display:flex;flex-direction:column;animation:sl .25s;border-left:1px solid var(--border)}
@keyframes sl{from{transform:translateX(100%)}to{transform:translateX(0)}}
.co{position:fixed;inset:0;background:rgba(30,41,59,.4);display:flex;align-items:center;justify-content:center;z-index:2000;backdrop-filter:blur(6px)}
.cb{background:#fff;border-radius:var(--radius-lg);padding:30px;width:min(400px,90vw);text-align:center;border:1px solid var(--border);box-shadow:var(--shadow-lg)}
.cb h4{font-size:16px;font-weight:700;margin-bottom:8px}
.cb p{color:var(--text2);font-size:14px;margin-bottom:20px}
.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:10px;border:1px solid var(--border);font-size:13px;font-weight:500;background:#fff}
.chip button{background:none;border:none;color:var(--text4);font-size:14px}
.sw{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:auto;background:#fff}
.sg{display:grid;font-size:12px}
.sh{padding:12px 8px;background:var(--cyan2);color:#fff;text-align:center;font-weight:600;font-size:11px;border-bottom:1px solid var(--border)}
.sh.td{background:#7C3AED}
.st{padding:8px 4px;font-size:10px;font-weight:600;color:var(--cyan2);text-align:center;background:#fff;border-right:1px solid var(--border);border-bottom:1px solid var(--border);font-family:var(--mono)}
.sc{padding:2px 3px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);min-height:36px;background:#fff}
.sc.td{background:rgba(6,182,212,.06)}
.sch{padding:3px 6px;border-radius:6px;font-size:10px;font-weight:600;display:block;margin:1px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.ht{width:100%;border-collapse:collapse;font-size:12px}
.ht th{padding:10px 4px;background:var(--accent);color:#fff;font-size:10px;font-weight:600;position:sticky;top:0;border-bottom:1px solid var(--border)}
.ht th:first-child{text-align:left;padding-left:14px;min-width:140px;position:sticky;left:0;z-index:3}
.ht th.today-th{background:#7C3AED}
.ht td{border-bottom:1px solid var(--border)}
.ht td:first-child{position:sticky;left:0;background:inherit;border-right:1px solid var(--border);padding:6px 12px}
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.meeting-time{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;background:var(--cyan-bg);color:var(--cyan2)}
.recurring-badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;background:var(--purple-bg);color:var(--purple2)}
.result-badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;background:var(--green-bg);color:var(--green)}
.analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.analytics-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
.chart-card{background:var(--card);border-radius:var(--radius-lg);border:1px solid var(--border);padding:22px}
.chart-card .chart-title{font-size:13px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:160px;padding-top:10px}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;cursor:pointer;transition:all .2s}
.bar-col:hover{transform:scaleY(1.05)}
.bar-fill{width:100%;border-radius:6px 6px 0 0;transition:height .5s;min-width:18px}
.bar-label{font-size:9px;color:var(--text3);font-weight:600;text-align:center}
.bar-value{font-size:10px;font-weight:700;color:var(--text2);font-family:var(--mono)}
.donut-container{display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap}
.donut-legend{display:flex;flex-direction:column;gap:6px}
.donut-legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
.donut-legend-dot{width:10px;height:10px;border-radius:3px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border:none}
.heatmap-grid{display:grid;grid-template-columns:repeat(53,1fr);gap:2px}
.heatmap-cell{aspect-ratio:1;border-radius:2px;transition:all .2s;cursor:pointer;min-height:10px}
.heatmap-cell:hover{transform:scale(1.5);z-index:1;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.wd-chip{padding:8px 12px;border-radius:10px;border:1.5px solid var(--border);background:#fff;color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;user-select:none}
.wd-chip.on{background:var(--purple);color:#fff;border-color:var(--purple)}
.metric-big{font-size:40px;font-weight:800;font-family:var(--mono);line-height:1}
.metric-sub{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-top:6px}
.rank-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.rank-num{width:24px;height:24px;border-radius:50%;background:var(--gradient);color:#fff;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rank-num.r2{background:linear-gradient(135deg,#C0C0C0,#808080)}
.rank-num.r3{background:linear-gradient(135deg,#CD7F32,#8B4513)}
.spark{display:flex;align-items:flex-end;gap:3px;height:50px}
.spark-bar{flex:1;background:var(--accent);border-radius:2px;min-width:2px;transition:all .3s}
.timeline-row{display:flex;align-items:center;gap:10px;padding:8px 0}
.timeline-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.timeline-line{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;position:relative}
.timeline-fill{height:100%;border-radius:3px}
@media(max-width:1024px){.analytics-grid,.analytics-grid-3{grid-template-columns:1fr}}
@media(max-width:768px){
.hdr{padding:12px 14px;gap:8px;flex-wrap:wrap;height:auto}
.main{padding:16px 14px}
.kpi-r{grid-template-columns:repeat(2,1fr)}
.dp{width:100vw}
}
</style>

/* Status calculator — returns a key + color, labels are resolved via i18n */
function getSK(t,now){
if(!t.name)return{k:"empty",c:"var(--text3)"};
if(t.progress>=100)return{k:"done",c:"var(--green)"};
if(t.deadline&&t.deadline<now&&t.progress<100)return{k:"overdue",c:"var(--red)"};
if(t.deadline){const dl=diffD(t.deadline,now);if(dl>=0&&dl<=2)return{k:"burn",c:"var(--amber)"};}
if(t.progress>0)return{k:"active",c:"var(--accent)"};
return{k:"new",c:"var(--text3)"};
}
function getS(t,now,L){
const s=getSK(t,now);
const LABELS={empty:{i:"",l:" "},done:{i:"✅",l:L.done||"Выполнено"},overdue:{i:"🔴",l:L.overdue||"Просрочено"},burn:{i:"⚠️",l:L.burning||"Горит"},active:{i:"🔄",l:L.active||"В работе"},new:{i:"🆕",l:L.new_task||"Новая"}};
return{...s,...LABELS[s.k]};
}
function getMSK(m,now){
if(!m.name)return{k:"empty",c:"var(--text3)"};
if(m.progress>=100||m.completedAt)return{k:"completed",c:"var(--green)"};
if(m.deadline&&m.deadline<now)return{k:"passed",c:"var(--text3)"};
if(m.start===now||m.deadline===now)return{k:"today",c:"var(--amber)"};
if(m.start&&m.start>now)return{k:"planned",c:"var(--cyan2)"};
return{k:"active",c:"var(--accent)"};
}
function getMS(m,now,L){
const s=getMSK(m,now);
const LABELS={empty:{l:" "},completed:{l:L.completed_status||"Завершено"},passed:{l:L.passed||"Прошло"},today:{l:L.today_status||"Сегодня"},planned:{l:L.planned||"Запланировано"},active:{l:L.active||"Активно"}};
return{...s,...LABELS[s.k]};
}

function periodRange(p){
const n=new Date();
if(p==="all")return[null,null];
if(p==="today"){const d=td();return[d,d]}
if(p==="week"){const d=new Date(n);d.setDate(d.getDate()-7);return[d.toISOString().split("T")[0],td()]}
if(p==="month"){const d=new Date(n);d.setMonth(d.getMonth()-1);return[d.toISOString().split("T")[0],td()]}
if(p==="quarter"){const d=new Date(n);d.setMonth(d.getMonth()-3);return[d.toISOString().split("T")[0],td()]}
if(p==="year"){const d=new Date(n);d.setFullYear(d.getFullYear()-1);return[d.toISOString().split("T")[0],td()]}
return[null,null]
}
function inPeriod(t,from,to){if(!from&&!to)return true;const dates=[t.start,t.deadline,t.createdAt&&t.createdAt.slice(0,10),t.completedAt].filter(Boolean);if(!dates.length)return true;return dates.some(d=>(!from||d>=from)&&(!to||d<=to))}

const Bdg=({children,color,bg})=><span className="bdg" style={{color,background:bg||color+"18"}}>{children}</span>;
const KPI=({label,value,sub,color,onClick})=><div className="kpi" style={onClick?{cursor:"pointer"}:{}} onClick={onClick}><div className="kpi-glow" style={{background:color}}/><div className="kpi-l">{label}</div><div className="kpi-v" style={{color}}>{value}</div><div className="kpi-s">{sub}</div></div>;

function PBar({value=0,color="var(--accent)",onChange,size=8}){
const ref=useRef(null);
const hc=e=>{if(!onChange||!ref.current)return;const r=ref.current.getBoundingClientRect();const p=Math.round(Math.max(0,Math.min(100,((e.clientX-r.left)/r.width)*100))/5)*5;onChange(p)};
return<div className="pw" ref={ref} onClick={hc} style={{height:size}} title={`${value}%`}>
<div className="pf" style={{width:`${Math.min(value,100)}%`,background:value>=100?'var(--gradient2)':color,height:size}}/>
</div>
}

function Confirm({title,text,onYes,onNo,yesLabel,noLabel,yesColor}){
return<div className="co" onClick={onNo}><div className="cb" onClick={e=>e.stopPropagation()}>
<h4>{title}</h4><p>{text}</p>
<div style={{display:"flex",gap:10,justifyContent:"center"}}>

</div></div></div>
}

function Toast({msg,type,onDone}){
useEffect(()=>{const t=setTimeout(onDone,3000);return()=>clearTimeout(t)},[]);
return<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:"#fff",padding:"12px 24px",borderRadius:12,fontSize:13,fontWeight:600,zIndex:4000,border:`1px solid ${type==='error'?'var(--red)':'var(--border)'}`,boxShadow:"var(--shadow-lg)",color:type==='error'?'var(--red)':'var(--text)'}}>{msg}</div>
}

function DonutChart({segments,size=140,thickness=24,centerLabel}){
const r=size/2;const cr=r-thickness/2;const circ=2*Math.PI*cr;let off=0;
return<svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
{segments.map((s,i)=>{const dash=circ*s.pct/100;const gap=circ-dash;const rot=-90+off*360/100;off+=s.pct;return<circle key={i} cx={r} cy={r} r={cr} fill="none" stroke={s.color} strokeWidth={thickness} strokeDasharray={`${dash} ${gap}`} transform={`rotate(${rot} ${r} ${r})`}/>})}
<text x={r} y={r-6} textAnchor="middle" fill="var(--text)" fontFamily="var(--mono)" fontSize="22" fontWeight="800">{segments.reduce((a,s)=>a+s.value,0)}</text>
<text x={r} y={r+12} textAnchor="middle" fill="var(--text2)" fontSize="10" fontWeight="600">{centerLabel||"TOTAL"}</text>
</svg>
}

</div>
</div>})}
</div>}
</div>
}

/* ─── Analytics ─── */
function AnalyticsPage({tasks,meetings,now,period,setPeriod,L}){
const[from,to]=periodRange(period);
const fT=useMemo(()=>tasks.filter(t=>t.name&&inPeriod(t,from,to)),[tasks,from,to]);
const total=fT.length;
const done=fT.filter(t=>getSK(t,now).k==="done");
const active=fT.filter(t=>getSK(t,now).k!=="done");
const burn=fT.filter(t=>getSK(t,now).k==="burn");
const over=fT.filter(t=>getSK(t,now).k==="overdue");
const avgProg=total?Math.round(fT.reduce((s,t)=>s+(t.progress||0),0)/total):0;
const cr=total?Math.round(done.length*100/total):0;

const byCat={};fT.forEach(t=>{if(t.cat)byCat[t.cat]=(byCat[t.cat]||0)+1});
const byPri={};fT.forEach(t=>{byPri[t.pri]=(byPri[t.pri]||0)+1});
const statusSeg=[{label:L.done,value:done.length,color:"var(--green)"},{label:L.active,value:active.filter(t=>getSK(t,now).k!=="burn"&&getSK(t,now).k!=="overdue").length,color:"var(--accent)"},{label:L.burning,value:burn.length,color:"var(--amber)"},{label:L.overdue,value:over.length,color:"var(--red)"}].filter(s=>s.value>0).map(s=>({...s,pct:total?s.value*100/total:0}));

const byWD=[0,0,0,0,0,0,0];done.forEach(t=>{if(t.completedAt){const d=new Date(t.completedAt).getDay();byWD[d===0?6:d-1]++}});
const wdNames=getDayN(L);
const maxWD=Math.max(...byWD,1);

const last30=Array.from({length:30},(_,i)=>{const d=new Date(now);d.setDate(d.getDate()-(29-i));return d.toISOString().split("T")[0]});
const trend=last30.map(d=>done.filter(t=>t.completedAt===d).length);
const maxTrend=Math.max(...trend,1);

const yr=Array.from({length:365},(_,i)=>{const d=new Date(now);d.setDate(d.getDate()-(364-i));return d.toISOString().split("T")[0]});
const heat=yr.map(d=>done.filter(t=>t.completedAt===d).length);
const maxHeat=Math.max(...heat,1);

const durations=done.filter(t=>t.completedAt&&t.createdAt).map(t=>diffD(t.completedAt,t.createdAt.slice(0,10)));
const avgDur=durations.length?Math.round(durations.reduce((a,b)=>a+b,0)/durations.length):0;
const onTime=done.filter(t=>t.completedAt&&t.deadline&&t.completedAt<=t.deadline).length;
const onTimePct=done.length?Math.round(onTime*100/done.length):0;

const topCats=Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,5);
const upcoming=active.filter(t=>t.deadline&&diffD(t.deadline,now)>=0).sort((a,b)=>a.deadline.localeCompare(b.deadline)).slice(0,5);

return<div>
<div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
<div className="seg"><button className={period==="all"?"on":""} onClick={()=>setPeriod("all")}>{L.all_time}</button><button className={period==="week"?"on":""} onClick={()=>setPeriod("week")}>{L.week}</button><button className={period==="month"?"on":""} onClick={()=>setPeriod("month")}>{L.month}</button><button className={period==="quarter"?"on":""} onClick={()=>setPeriod("quarter")}>{L.quarter}</button><button className={period==="year"?"on":""} onClick={()=>setPeriod("year")}>{L.year}</button></div>
<span style={{fontSize:12,color:"var(--text3)",marginLeft:"auto"}}>{total} {L.tasks_count}</span>
</div>

<div className="analytics-grid-3">
<div className="chart-card"><div className="metric-big" style={{color:"var(--accent)"}}>{total}</div><div className="metric-sub">{L.analytics_total_tasks}</div></div>
<div className="chart-card"><div className="metric-big" style={{color:"var(--green)"}}>{cr}%</div><div className="metric-sub">{L.analytics_completion_rate}</div></div>
<div className="chart-card"><div className="metric-big" style={{color:"var(--amber)"}}>{avgDur}{L.days_short}</div><div className="metric-sub">{L.analytics_avg_duration}</div></div>
</div>

<div className="analytics-grid">
<div className="chart-card">
<div className="chart-title">📊 {L.analytics_status}</div>
{statusSeg.length?<div className="donut-container"><DonutChart segments={statusSeg} centerLabel="TOTAL"/>
<div className="donut-legend">{statusSeg.map((s,i)=><div key={i} className="donut-legend-item"><span className="donut-legend-dot" style={{background:s.color}}/>{s.label}: <strong>{s.value}</strong> ({Math.round(s.pct)}%)</div>)}</div>
</div>:<div style={{textAlign:"center",padding:30,color:"var(--text4)"}}>{L.no_data}</div>}
</div>
<div className="chart-card">
<div className="chart-title">🎯 {L.analytics_priorities}</div>
<div style={{display:"flex",flexDirection:"column",gap:12}}>
{Object.entries(byPri).map(([p,c])=>{const pct=Math.round(c*100/total);return<div key={p}>
<div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:13}}><span style={{fontWeight:600}}>{p}</span><span style={{fontFamily:"var(--mono)",color:"var(--text3)"}}>{c} ({pct}%)</span></div>
<div className="pw" style={{height:10}}><div className="pf" style={{width:`${pct}%`,background:gp(p),height:10}}/></div>
</div>})}
</div>
</div>
</div>

<div className="analytics-grid">
<div className="chart-card">
<div className="chart-title">📁 {L.analytics_top_cats}</div>
{topCats.length?<div style={{display:"flex",flexDirection:"column",gap:10}}>
{topCats.map(([c,cnt],i)=><div key={c} className="rank-item">
<div className={`rank-num ${i===1?"r2":i===2?"r3":""}`}>{i+1}</div>
<div style={{flex:1}}>
<div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontWeight:600,fontSize:13}}>{c}</span><span style={{fontFamily:"var(--mono)",fontSize:12,color:"var(--text3)"}}>{cnt}</span></div>
<div className="pw"><div className="pf" style={{width:`${cnt*100/total}%`,background:gc(c)}}/></div>
</div>
</div>)}
</div>:<div style={{textAlign:"center",padding:30,color:"var(--text4)"}}>{L.no_data}</div>}
</div>

<div className="chart-card">
<div className="chart-title">📅 {L.analytics_weekdays}</div>
<div className="bar-chart">
{byWD.map((v,i)=><div key={i} className="bar-col" title={`${wdNames[i]}: ${v}`}>
<div className="bar-value">{v}</div>
<div className="bar-fill" style={{height:`${v*100/maxWD}%`,background:v?"var(--gradient)":"var(--bg3)"}}/>
<div className="bar-label">{wdNames[i]}</div>
</div>)}
</div>
</div>
</div>

<div className="chart-card" style={{marginBottom:16}}>
<div className="chart-title">📈 {L.analytics_trend}</div>
<div className="bar-chart" style={{height:100}}>
{trend.map((v,i)=><div key={i} className="bar-col" title={`${fmtS(last30[i])}: ${v}`}>
<div className="bar-fill" style={{height:`${v*100/maxTrend}%`,background:v?"var(--accent)":"var(--bg3)"}}/>
</div>)}
</div>
<div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:10,color:"var(--text4)"}}><span>{fmtS(last30[0])}</span><span>{fmtS(last30[29])}</span></div>
</div>

<div className="chart-card" style={{marginBottom:16}}>
<div className="chart-title">🔥 {L.analytics_heatmap}</div>
<div className="heatmap-grid">
{heat.map((v,i)=>{const intensity=v/maxHeat;const bg=v===0?"var(--bg3)":`rgba(16,185,129,${.2+intensity*.8})`;return<div key={i} className="heatmap-cell" style={{background:bg}} title={`${fmtS(yr[i])}: ${v}`}/>})}
</div>
</div>

<div className="analytics-grid">
<div className="chart-card">
<div className="chart-title">⚡ {L.analytics_completion_speed}</div>
<div style={{display:"flex",justifyContent:"space-around",textAlign:"center",padding:"10px 0"}}>
<div><div className="metric-big" style={{color:"var(--accent)"}}>{avgDur}</div><div className="metric-sub">{L.days_per_task}</div></div>
<div><div className="metric-big" style={{color:"var(--green)"}}>{onTimePct}%</div><div className="metric-sub">{L.on_time_completion}</div></div>
</div>
</div>
<div className="chart-card">
<div className="chart-title">⏰ {L.analytics_upcoming}</div>
{upcoming.length?<div style={{display:"flex",flexDirection:"column",gap:6}}>
{upcoming.map(t=>{const d=diffD(t.deadline,now);return<div key={t.id} className="timeline-row">
<div className="timeline-dot" style={{background:d<=2?"var(--amber)":"var(--accent)"}}/>
<div style={{flex:1,fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.name}</div>
<span style={{fontSize:11,fontFamily:"var(--mono)",color:d<=2?"var(--amber)":"var(--text3)",fontWeight:700}}>{d}{L.days_short}</span>
</div>})}
</div>:<div style={{textAlign:"center",padding:30,color:"var(--text4)"}}>{L.no_deadlines}</div>}
</div>
</div>
</div>
}
</script>
<script type="text/babel">

const data=useMemo(()=>{
const fT=tasks.filter(t=>t.name&&inPeriod(t,from,to));

return{tasks:fT,meetings:fM}
},[tasks,meetings,from,to,incMeet]);

const now=td();
const done=data.tasks.filter(t=>getSK(t,now).k==="done");
const active=data.tasks.filter(t=>getSK(t,now).k!=="done"&&getSK(t,now).k!=="burn"&&getSK(t,now).k!=="overdue");

const cr=data.tasks.length?Math.round(done.length*100/data.tasks.length):0;
const onTime=done.filter(t=>t.completedAt&&t.deadline&&t.completedAt<=t.deadline).length;
const durations=done.filter(t=>t.completedAt&&t.createdAt).map(t=>diffD(t.completedAt,t.createdAt.slice(0,10)));
const avgDur=durations.length?Math.round(durations.reduce((a,b)=>a+b,0)/durations.length):0;

const byCat={};data.tasks.forEach(t=>{if(t.cat)byCat[t.cat]=(byCat[t.cat]||0)+1});
const byPri={};data.tasks.forEach(t=>{byPri[t.pri]=(byPri[t.pri]||0)+1});

const doPrint=()=>{window.print()};

return<div>
{!preview?<>
<div className="card" style={{marginBottom:16}}>

</div>
</div>
<div className="card">
<div className="stitle">📊 {L.overview}</div>
<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10}}>

<div style={{padding:12,background:"var(--bg)",borderRadius:10,textAlign:"center"}}><div style={{fontSize:22,fontWeight:800,color:"var(--green)",fontFamily:"var(--mono)"}}>{done.length}</div><div style={{fontSize:11,color:"var(--text3)",textTransform:"uppercase"}}>{L.done}</div></div>
<div style={{padding:12,background:"var(--bg)",borderRadius:10,textAlign:"center"}}><div style={{fontSize:22,fontWeight:800,color:"var(--red)",fontFamily:"var(--mono)"}}>{over.length}</div><div style={{fontSize:11,color:"var(--text3)",textTransform:"uppercase"}}>{L.overdue}</div></div>

<div style={{display:"flex",gap:10,marginBottom:16}} className="no-print">
<button className="bo" onClick={()=>setPreview(false)}>← {L.cancel}</button>

{incMeet&&pastMeet.length>0&&<div style={{marginBottom:24,pageBreakInside:"avoid"}}>

<table style={{width:"100%",fontSize:12,borderCollapse:"collapse"}}>
<thead><tr style={{background:"var(--bg)"}}><th style={{padding:8,textAlign:"left",border:"1px solid var(--border)"}}>{L.meeting_name_col}</th><th style={{padding:8,textAlign:"left",border:"1px solid var(--border)"}}>{L.date_col}</th><th style={{padding:8,textAlign:"left",border:"1px solid var(--border)"}}>{L.time_col_short}</th><th style={{padding:8,textAlign:"left",border:"1px solid var(--border)"}}>{L.priority}</th></tr></thead>
<tbody>{pastMeet.map(m=><tr key={m.id}><td style={{padding:8,border:"1px solid var(--border)"}}>{m.name}</td><td style={{padding:8,border:"1px solid var(--border)"}}>{fmt(m.start)}</td><td style={{padding:8,border:"1px solid var(--border)"}}>{m.timeStart||"\u2014"}{m.timeEnd?`—${m.timeEnd}`:""}</td><td style={{padding:8,border:"1px solid var(--border)"}}>{m.pri}</td></tr>)}</tbody>
</table>
</div>}

{incMeet&&withResult.length>0&&<div style={{marginBottom:24}}>
<h3 style={{fontSize:14,fontWeight:800,marginBottom:12,textTransform:"uppercase",color:"var(--cyan2)"}}>📝 {L.export_meetings_results} ({withResult.length})</h3>
<div style={{display:"flex",flexDirection:"column",gap:10}}>
{withResult.map(m=><div key={m.id} style={{padding:12,background:"var(--cyan-bg)",borderRadius:10,border:"1px solid rgba(6,182,212,.2)",pageBreakInside:"avoid"}}>
<div style={{fontWeight:700,fontSize:13,marginBottom:4}}>{m.name}</div>
<div style={{fontSize:11,color:"var(--text3)",marginBottom:6}}>📅 {fmt(m.start)}{m.timeStart&&` • 🕐 ${m.timeStart}${m.timeEnd?`—${m.timeEnd}`:""}`} • {m.pri}</div>
<div style={{fontSize:12,color:"var(--text2)",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{m.meetingResult}</div>
</div>)}
</div>
</div>}

<div style={{textAlign:"center",fontSize:10,color:"var(--text4)",paddingTop:20,borderTop:"1px solid var(--border)",marginTop:30}}>{L.report_auto} • {fmt(now)}</div>
</div>
</>}
</div>
}

/* ─── Settings ─── */
function SettingsPage({settings,setSettings,cats,setCats,pris,setPris,lang,setLang,L}){
const update=(k,v)=>setSettings({...settings,[k]:v});
const[newCat,setNewCat]=useState("");
const[newPri,setNewPri]=useState("");
const addCat=()=>{if(newCat.trim()&&!cats.includes(newCat.trim())){setCats([...cats,newCat.trim()]);setNewCat("")}};
const delCat=c=>{if(cats.length>1)setCats(cats.filter(x=>x!==c))};
const addPri=()=>{if(newPri.trim()&&!pris.includes(newPri.trim())){setPris([...pris,newPri.trim()]);setNewPri("")}};
const delPri=p=>{if(pris.length>1)setPris(pris.filter(x=>x!==p))};
const resetAll=()=>{if(confirm(L.reset_confirm)){localStorage.clear();location.reload()}};

return<div style={{maxWidth:800}}>
<div className="card" style={{marginBottom:16}}>
<div className="stitle">🌐 {L.language}</div>
<div className="seg" style={{width:"fit-content"}}>
<button className={lang==="ru"?"on":""} onClick={()=>setLang("ru")}>🇷🇺 Русский</button>
<button className={lang==="uk"?"on":""} onClick={()=>setLang("uk")}>🇺🇦 Українська</button>
</div>
</div>

<div className="card" style={{marginBottom:16}}>
<div className="stitle">🎨 {L.appearance}</div>
<div style={{display:"flex",flexDirection:"column",gap:10}}>
<label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}><input type="checkbox" checked={settings.compact_mode||false} onChange={e=>update("compact_mode",e.target.checked)} style={{width:16,height:16}}/><span style={{fontSize:13}}>{L.compact_mode}</span></label>
<label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}><input type="checkbox" checked={settings.animations!==false} onChange={e=>update("animations",e.target.checked)} style={{width:16,height:16}}/><span style={{fontSize:13}}>{L.animations}</span></label>
</div>
</div>

<div className="card" style={{marginBottom:16}}>
<div className="stitle">📁 {L.categories_label}</div>
<div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
{cats.map(c=><div key={c} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",background:gc(c)+"20",color:gc(c),borderRadius:8,fontSize:12,fontWeight:600}}>{c} {cats.length>1&&<span onClick={()=>delCat(c)} style={{cursor:"pointer",fontSize:14}}>×</span>}</div>)}
</div>
<div style={{display:"flex",gap:8}}>
<input value={newCat} onChange={e=>setNewCat(e.target.value)} placeholder={L.category} style={{flex:1,padding:8,borderRadius:8,border:"1.5px solid var(--border)",fontSize:13}} onKeyDown={e=>e.key==="Enter"&&addCat()}/>
<button className="bo" onClick={addCat}>+ {L.add_btn}</button>
</div>
</div>

<div className="card" style={{marginBottom:16}}>
<div className="stitle">🎯 {L.priorities_label}</div>
<div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
{pris.map(p=><div key={p} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",background:gb(p),color:gp(p),borderRadius:8,fontSize:12,fontWeight:600}}>{p} {pris.length>1&&<span onClick={()=>delPri(p)} style={{cursor:"pointer",fontSize:14}}>×</span>}</div>)}
</div>
<div style={{display:"flex",gap:8}}>
<input value={newPri} onChange={e=>setNewPri(e.target.value)} placeholder={L.priority} style={{flex:1,padding:8,borderRadius:8,border:"1.5px solid var(--border)",fontSize:13}} onKeyDown={e=>e.key==="Enter"&&addPri()}/>
<button className="bo" onClick={addPri}>+ {L.add_btn}</button>
</div>
</div>

<div className="card" style={{marginBottom:16}}>
<div className="stitle">📊 {L.panel_label}</div>
<div style={{display:"flex",flexDirection:"column",gap:10}}>
<label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}><input type="checkbox" checked={settings.panel_show_priorities!==false} onChange={e=>update("panel_show_priorities",e.target.checked)} style={{width:16,height:16}}/><span style={{fontSize:13}}>{L.show_priorities}</span></label>
<label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}><input type="checkbox" checked={settings.panel_show_categories!==false} onChange={e=>update("panel_show_categories",e.target.checked)} style={{width:16,height:16}}/><span style={{fontSize:13}}>{L.show_categories}</span></label>
<label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}><input type="checkbox" checked={settings.panel_show_progress_bar!==false} onChange={e=>update("panel_show_progress_bar",e.target.checked)} style={{width:16,height:16}}/><span style={{fontSize:13}}>{L.show_progress_bar}</span></label>
<label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}><input type="checkbox" checked={settings.panel_show_urgent!==false} onChange={e=>update("panel_show_urgent",e.target.checked)} style={{width:16,height:16}}/><span style={{fontSize:13}}>{L.show_urgent}</span></label>
</div>
</div>

<div className="card" style={{marginBottom:16}}>
<div className="stitle">📋 {L.tasks_label}</div>
<div style={{display:"flex",flexDirection:"column",gap:10}}>
<label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}><input type="checkbox" checked={settings.tasks_show_recurring_badge!==false} onChange={e=>update("tasks_show_recurring_badge",e.target.checked)} style={{width:16,height:16}}/><span style={{fontSize:13}}>{L.show_recurring_badge}</span></label>
<label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}><input type="checkbox" checked={settings.tasks_show_completed_date!==false} onChange={e=>update("tasks_show_completed_date",e.target.checked)} style={{width:16,height:16}}/><span style={{fontSize:13}}>{L.show_completed_date}</span></label>
</div>
</div>

<div className="card" style={{marginBottom:16}}>
<div className="stitle">🕐 {L.meetings_label}</div>
<div style={{display:"flex",flexDirection:"column",gap:10}}>
<label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}><input type="checkbox" checked={settings.meetings_show_calendar!==false} onChange={e=>update("meetings_show_calendar",e.target.checked)} style={{width:16,height:16}}/><span style={{fontSize:13}}>{L.show_calendar}</span></label>
<label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}><input type="checkbox" checked={settings.meetings_show_result_preview!==false} onChange={e=>update("meetings_show_result_preview",e.target.checked)} style={{width:16,height:16}}/><span style={{fontSize:13}}>{L.show_result_preview}</span></label>
</div>
</div>

<div className="card" style={{marginBottom:16}}>
<div className="stitle">☀️ {L.today_label}</div>
<div style={{display:"flex",flexDirection:"column",gap:10}}>
<label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}><input type="checkbox" checked={settings.today_show_meetings!==false} onChange={e=>update("today_show_meetings",e.target.checked)} style={{width:16,height:16}}/><span style={{fontSize:13}}>{L.show_meetings_today}</span></label>
<label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}><input type="checkbox" checked={settings.today_show_tasks!==false} onChange={e=>update("today_show_tasks",e.target.checked)} style={{width:16,height:16}}/><span style={{fontSize:13}}>{L.show_tasks_today}</span></label>
</div>
</div>

<div className="card" style={{marginBottom:16}}>
<div className="stitle">📄 {L.export_label}</div>
<div style={{display:"flex",flexDirection:"column",gap:10}}>
<label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}><input type="checkbox" checked={settings.export_include_meetings!==false} onChange={e=>update("export_include_meetings",e.target.checked)} style={{width:16,height:16}}/><span style={{fontSize:13}}>{L.include_meetings_export}</span></label>
</div>
</div>

<div className="card" style={{marginBottom:16,background:"var(--red-bg)",borderColor:"rgba(239,68,68,.3)"}}>
<div className="stitle" style={{color:"var(--red)"}}>⚠️ {L.danger_zone}</div>
<p style={{fontSize:12,color:"var(--text3)",marginBottom:10}}>{L.reset_warning}</p>
<button className="bd" onClick={resetAll}>🗑 {L.reset_all}</button>
</div>
</div>
}

/* ─── MAIN APP ─── */
function App(){
const[lang,setLang]=useLS("lang","ru");
const L=t[lang];
const[settings,setSettings]=useLS("settings",{compact_mode:false,animations:true,panel_show_priorities:true,panel_show_categories:true,panel_show_progress_bar:true,panel_show_urgent:true,tasks_show_recurring_badge:true,tasks_show_completed_date:true,meetings_show_calendar:true,meetings_show_result_preview:true,today_show_meetings:true,today_show_tasks:true,export_include_meetings:true});
const[cats,setCats]=useLS("cats",["Проекты","Разработка","Продажи","Поддержка","Админ"]);
const[pris,setPris]=useLS("pris",lang==="uk"?["Високий","Середній","Низький"]:["Высокий","Средний","Низкий"]);
const[tasks,setTasks]=useLS("tasks",[]);
const[meetings,setMeetings]=useLS("meetings",[]);
const[recurring,setRecurring]=useLS("recurring",[]);
const[page,setPage]=useState("panel");
const[now,setNow]=useState(td());
const[showT,setShowT]=useState(false);
const[showM,setShowM]=useState(false);
const[showR,setShowR]=useState(false);
const[editT,setEditT]=useState(null);
const[editM,setEditM]=useState(null);
const[editR,setEditR]=useState(null);
const[detail,setDetail]=useState(null);
const[kpiDrill,setKpiDrill]=useState(null);
const[delR,setDelR]=useState(null);

// filters
const[tFilter,setTFilter]=useState("active");
const[tSort,setTSort]=useState("deadline");
const[tCat,setTCat]=useState("all");
const[tPri,setTPri]=useState("all");
const[mFilter,setMFilter]=useState("upcoming");
const[mSort,setMSort]=useState("date");
const[todaySort,setTodaySort]=useState("priority");
const[jPeriod,setJPeriod]=useState("month");
const[jSort,setJSort]=useState("completed");
const[jCat,setJCat]=useState("all");
const[aPeriod,setAPeriod]=useState("month");

// Generate recurring
useEffect(()=>{
const today=td();
recurring.filter(r=>r.active).forEach(r=>{
const wd=typeof r.weekdays==="string"?r.weekdays.split(",").filter(Boolean).map(Number):r.weekdays||[];
if(!wd.length)return;
if(r.startDate&&today<r.startDate)return;
if(r.endDate&&today>r.endDate)return;
const d=new Date(today);const dow=d.getDay();const adj=dow===0?6:dow-1;
if(!wd.includes(adj))return;
if(r.kind==="task"){
const exists=tasks.some(t=>t.recurringId===r.id&&t.start===today);
if(!exists){
const dl=new Date(today);dl.setDate(dl.getDate()+(r.deadlineDays||0));
setTasks(p=>[...p,{id:uid(),type:"task",name:r.name,desc:r.desc||"",cat:r.cat||cats[0],pri:r.pri,start:today,deadline:dl.toISOString().split("T")[0],progress:0,notes:r.notes||"",taskResult:"",recurringId:r.id,createdAt:new Date().toISOString()}])
}
}else{
const exists=meetings.some(m=>m.recurringId===r.id&&m.start===today);
if(!exists){
setMeetings(p=>[...p,{id:uid(),type:"meeting",name:r.name,desc:r.desc||"",pri:r.pri,start:today,deadline:today,timeStart:r.timeStart||"",timeEnd:r.timeEnd||"",progress:0,notes:r.notes||"",meetingResult:"",recurringId:r.id,createdAt:new Date().toISOString()}])
}
}
})
},[recurring]);

const addTask=data=>{setTasks(p=>[...p,{id:uid(),type:"task",progress:0,taskResult:"",createdAt:new Date().toISOString(),...data}])};
const editTask=data=>{setTasks(p=>p.map(t=>t.id===editT.id?{...t,...data}:t));setEditT(null)};
const delTask=id=>{setTasks(p=>p.filter(t=>t.id!==id));setDetail(null)};
const progTask=(id,v)=>{setTasks(p=>p.map(t=>t.id===id?{...t,progress:v,completedAt:v===100?td():null}:t));setDetail(d=>d&&d.id===id?{...d,progress:v,completedAt:v===100?td():null}:d)};
const saveResultTask=(id,field,val)=>{setTasks(p=>p.map(t=>t.id===id?{...t,[field]:val}:t));setDetail(d=>d&&d.id===id?{...d,[field]:val}:d)};

const addMeet=data=>{setMeetings(p=>[...p,{id:uid(),type:"meeting",progress:0,meetingResult:"",createdAt:new Date().toISOString(),...data}])};
const editMeet=data=>{setMeetings(p=>p.map(m=>m.id===editM.id?{...m,...data}:m));setEditM(null)};
const delMeet=id=>{setMeetings(p=>p.filter(m=>m.id!==id));setDetail(null)};
const progMeet=(id,v)=>{setMeetings(p=>p.map(m=>m.id===id?{...m,progress:v,completedAt:v===100?td():null}:m));setDetail(d=>d&&d.id===id?{...d,progress:v,completedAt:v===100?td():null}:d)};
const saveResultMeet=(id,field,val)=>{setMeetings(p=>p.map(m=>m.id===id?{...m,[field]:val}:m));setDetail(d=>d&&d.id===id?{...d,[field]:val}:d)};

const addRec=data=>setRecurring(p=>[...p,{id:uid(),createdAt:new Date().toISOString(),...data}]);
const editRec=data=>{setRecurring(p=>p.map(r=>r.id===editR.id?{...r,...data}:r));setEditR(null)};
const delRec=id=>setRecurring(p=>p.filter(r=>r.id!==id));

const openDetail=item=>setDetail(item);
const detailEdit=item=>{setDetail(null);if(item.type==="meeting")setEditM(item);else setEditT(item)};
const detailDelete=id=>{if(detail?.type==="meeting")delMeet(id);else delTask(id)};
const detailProg=(id,v)=>{if(detail?.type==="meeting")progMeet(id,v);else progTask(id,v)};
const detailSaveResult=(id,field,val)=>{if(detail?.type==="meeting")saveResultMeet(id,field,val);else saveResultTask(id,field,val)};

const pages=[
{k:"panel",label:L.panel,icon:"📊"},
{k:"tasks",label:L.tasks,icon:"📋"},
{k:"meetings",label:L.meetings,icon:"🕐"},
{k:"today",label:L.today,icon:"☀️"},
{k:"cycles",label:L.cycles,icon:"🔁"},
{k:"journal",label:L.journal,icon:"📔"},
{k:"analytics",label:L.analytics,icon:"📈"},
{k:"export",label:L.export,icon:"📄"},
{k:"settings",label:L.settings,icon:"⚙️"}
];

return<div style={{minHeight:"100vh",background:"var(--bg)"}}>
<div className="hdr no-print">
<div className="hw">
<div style={{display:"flex",alignItems:"center",gap:14}}>
<div style={{width:38,height:38,borderRadius:10,background:"var(--gradient)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>⚡</div>
<div><div style={{fontSize:16,fontWeight:800,background:"var(--gradient)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>PROGRESS MANAGER</div><div style={{fontSize:10,color:"var(--text3)",letterSpacing:".6px",textTransform:"uppercase"}}>{L.tagline}</div></div>
</div>
<div style={{display:"flex",gap:8,alignItems:"center"}}>
<button className="bp" onClick={()=>setShowT(true)}>+ {L.task_kind}</button>
<button className="bp bp-cyan" onClick={()=>setShowM(true)}>+ {L.meeting_kind}</button>
<button className="bp bp-purple" onClick={()=>setShowR(true)}>+ 🔁</button>
</div>
</div>
</div>

<div className="nav-bar no-print">
<div className="hw">
<div style={{display:"flex",gap:4,overflowX:"auto",padding:"8px 0"}}>
{pages.map(p=><button key={p.k} onClick={()=>setPage(p.k)} style={{padding:"8px 14px",borderRadius:8,border:"none",background:page===p.k?"var(--accent)":"transparent",color:page===p.k?"#fff":"var(--text2)",cursor:"pointer",fontSize:13,fontWeight:600,whiteSpace:"nowrap",transition:"var(--trans)"}}>{p.icon} {p.label}</button>)}
</div>
</div>
</div>

<div className="hw" style={{padding:"20px 20px 40px"}}>
{page==="panel"&&<PanelPage tasks={tasks} meetings={meetings} now={now} onOpenTask={openDetail} onKpiClick={setKpiDrill} settings={settings} L={L}/>}
{page==="tasks"&&<TasksPage tasks={tasks} now={now} onOpenTask={openDetail} onProg={progTask} filter={tFilter} setFilter={setTFilter} sortBy={tSort} setSortBy={setTSort} cats={cats} pris={pris} catFilter={tCat} setCatFilter={setTCat} priFilter={tPri} setPriFilter={setTPri} settings={settings} L={L}/>}
{page==="meetings"&&<MeetingsPage meetings={meetings} now={now} onOpenTask={openDetail} filter={mFilter} setFilter={setMFilter} sortBy={mSort} setSortBy={setMSort} settings={settings} L={L}/>}
{page==="today"&&<TodayPage tasks={tasks} meetings={meetings} now={now} onOpenTask={openDetail} onProg={progTask} sortBy={todaySort} setSortBy={setTodaySort} settings={settings} L={L}/>}
{page==="cycles"&&<CyclesPage recurring={recurring} cats={cats} pris={pris} onAdd={()=>setShowR(true)} onEdit={setEditR} onDelete={setDelR} L={L}/>}
{page==="journal"&&<JournalPage tasks={tasks} meetings={meetings} now={now} onOpenTask={openDetail} period={jPeriod} setPeriod={setJPeriod} sortBy={jSort} setSortBy={setJSort} catFilter={jCat} setCatFilter={setJCat} cats={cats} L={L}/>}
{page==="analytics"&&<AnalyticsPage tasks={tasks} meetings={meetings} now={now} period={aPeriod} setPeriod={setAPeriod} L={L}/>}
{page==="export"&&<ExportPage tasks={tasks} meetings={meetings} settings={settings} L={L}/>}
{page==="settings"&&<SettingsPage settings={settings} setSettings={setSettings} cats={cats} setCats={setCats} pris={pris} setPris={setPris} lang={lang} setLang={setLang} L={L}/>}
</div>

{showT&&<TForm onClose={()=>setShowT(false)} onSubmit={addTask} cats={cats} pris={pris} L={L}/>}
{editT&&<TForm onClose={()=>setEditT(null)} initial={editT} onSubmit={editTask} cats={cats} pris={pris} L={L}/>}
{showM&&<MForm onClose={()=>setShowM(false)} onSubmit={addMeet} pris={pris} L={L}/>}
{editM&&<MForm onClose={()=>setEditM(null)} initial={editM} onSubmit={editMeet} pris={pris} L={L}/>}
{showR&&<RForm onClose={()=>setShowR(false)} onSubmit={addRec} cats={cats} pris={pris} L={L}/>}
{editR&&<RForm onClose={()=>setEditR(null)} initial={editR} onSubmit={editRec} cats={cats} pris={pris} L={L}/>}

{detail&&<TDetail task={detail} onClose={()=>setDetail(null)} onEdit={detailEdit} onDelete={detailDelete} onProg={detailProg} onSaveResult={detailSaveResult} now={now} L={L}/>}
{kpiDrill&&<KpiDrill kpi={kpiDrill} tasks={tasks} now={now} onClose={()=>setKpiDrill(null)} onOpenTask={openDetail} L={L}/>}
{delR&&<Confirm title={L.delete_cycle_title} text={`«${delR.name}» ${L.delete_cycle_text}`} onNo={()=>setDelR(null)} onYes={()=>{delRec(delR.id);setDelR(null)}} yesLabel={L.yes_delete} noLabel={L.cancel} yesColor="var(--red)"/>}
</div>
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
