<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Smart Planner Pro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#F0F4FA;--bg2:#FFFFFF;--bg3:#F6F8FC;--bg4:#EDF1F7;
--card:#FFFFFF;
--accent:#4361EE;--accent2:#3A56D4;--accent-bg:rgba(67,97,238,.08);
--green:#10B981;--green-bg:rgba(16,185,129,.08);
--amber:#F59E0B;--amber-bg:rgba(245,158,11,.08);
--red:#EF4444;--red-bg:rgba(239,68,68,.08);
--cyan:#06B6D4;--cyan2:#0891B2;--cyan-bg:rgba(6,182,212,.08);
--purple:#8B5CF6;--purple2:#7C3AED;--purple-bg:rgba(139,92,246,.08);
--text:#1E293B;--text2:#475569;--text3:#94A3B8;--text4:#CBD5E1;
--border:#E2E8F0;--border2:#CBD5E1;
--radius:14px;--radius-lg:20px;
--shadow-lg:0 8px 32px rgba(0,0,0,.1);
--font:'DM Sans',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace;
--gradient:linear-gradient(135deg,#4361EE,#7C3AED);
--gradient2:linear-gradient(135deg,#10B981,#06B6D4);
}
html,body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased;line-height:1.5}
button{font-family:var(--font);cursor:pointer;transition:all .2s}
input,select,textarea{font-family:var(--font)}
button:active{transform:scale(.96)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:8px}
::selection{background:var(--accent);color:#fff}
.hdr{background:#FFFFFF;box-shadow:0 1px 3px rgba(0,0,0,.06);padding:0 32px;display:flex;align-items:center;height:64px;position:sticky;top:0;z-index:100;gap:16px;border-bottom:1px solid var(--border)}
.hdr-brand{display:flex;align-items:center;gap:12px;margin-right:auto}
.hdr-logo{width:38px;height:38px;border-radius:12px;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 12px rgba(67,97,238,.3)}
.hdr-brand h1{font-size:16px;font-weight:700}.hdr-brand small{color:var(--text3);font-size:11px}
.tabs{display:flex;height:64px;align-items:stretch;gap:2px;overflow-x:auto}
.tab{padding:0 14px;border:none;background:0;color:var(--text3);font-weight:500;font-size:13px;position:relative;display:flex;align-items:center;gap:6px;border-radius:10px 10px 0 0;white-space:nowrap}
.tab:hover{color:var(--text2);background:var(--bg)}
.tab.on{color:var(--accent);font-weight:700}
.tab.on::after{content:"";position:absolute;bottom:0;left:8px;right:8px;height:3px;background:var(--gradient);border-radius:3px 3px 0 0}
.tab .tab-icon{font-size:15px}
.add-b{height:38px;padding:0 18px;border-radius:12px;border:none;background:var(--gradient);color:#fff;font-weight:600;font-size:13px;display:flex;align-items:center;gap:6px;box-shadow:0 2px 10px rgba(67,97,238,.25)}
.add-b:hover{box-shadow:0 4px 16px rgba(67,97,238,.35);transform:translateY(-1px)}
.add-m{background:linear-gradient(135deg,#06B6D4,#0891B2);box-shadow:0 2px 10px rgba(6,182,212,.25)}
.add-r{background:linear-gradient(135deg,#8B5CF6,#7C3AED);box-shadow:0 2px 10px rgba(139,92,246,.25)}
.set-b{width:38px;height:38px;border-radius:12px;border:1px solid var(--border);background:var(--bg);color:var(--text3);font-size:16px;display:flex;align-items:center;justify-content:center}
.set-b:hover{background:var(--bg4);color:var(--text)}
.main{padding:28px 32px;max-width:1400px;margin:0 auto}
.card{background:var(--card);border-radius:var(--radius-lg);border:1px solid var(--border);padding:22px;transition:all .2s}
.card:hover{border-color:var(--border2)}
.stitle{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.kpi-r{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
.kpi{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:20px;position:relative;overflow:hidden;transition:all .3s}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.kpi-glow{position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.06;filter:blur(20px);pointer-events:none}
.kpi-l{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:1.2px}
.kpi-v{font-size:32px;font-weight:800;margin-top:6px;font-family:var(--mono);color:var(--accent)}
.kpi-s{font-size:11px;color:var(--text4);margin-top:4px}
.bdg{display:inline-flex;padding:3px 10px;border-radius:8px;font-size:11px;font-weight:600;white-space:nowrap}
.pw{position:relative;width:100%;height:8px;background:var(--bg4);border-radius:10px;cursor:pointer;overflow:hidden;transition:height .2s}
.pw:hover{height:14px}
.pf{height:100%;border-radius:10px;transition:width .3s}
.tr{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .25s}
.tr:hover{border-color:var(--accent);box-shadow:0 4px 20px rgba(67,97,238,.1);transform:translateY(-1px)}
.tr.done{opacity:.4}
.task-left{width:4px;align-self:stretch;border-radius:4px;flex-shrink:0}
.seg{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--card)}
.seg button{padding:8px 14px;border:none;background:transparent;color:var(--text3);font-size:12px;font-weight:600;border-right:1px solid var(--border)}
.seg button:last-child{border:none}
.seg button:hover{color:var(--text2);background:var(--bg)}
.seg button.on{background:var(--accent);color:#fff}
.seg-cyan button.on{background:var(--cyan2)}
.seg-purple button.on{background:var(--purple2)}
.mo{position:fixed;inset:0;background:rgba(30,41,59,.5);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(8px);animation:fi .2s}
.md{background:#FFF;border-radius:var(--radius-lg);width:min(600px,94vw);max-height:90vh;overflow:hidden;box-shadow:var(--shadow-lg);animation:su .25s;display:flex;flex-direction:column;border:1px solid var(--border)}
.mh{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg3)}
.mh h3{font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px}
.mb{padding:24px;overflow-y:auto;flex:1}
.mc{width:32px;height:32px;border-radius:10px;border:1px solid var(--border);background:#fff;font-size:18px;color:var(--text3);display:flex;align-items:center;justify-content:center}
.mc:hover{background:var(--bg4);color:var(--text)}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1}}
.fl{display:flex;flex-direction:column;gap:6px}
.fl label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px}
.fl input,.fl select,.fl textarea{padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;color:var(--text);background:#fff;outline:none;width:100%;transition:all .2s}
.fl input:focus,.fl select:focus,.fl textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(67,97,238,.1)}
.fl textarea{resize:vertical;min-height:64px}
.bp{padding:12px 24px;border-radius:12px;border:none;background:var(--gradient);color:#fff;font-size:14px;font-weight:700;width:100%;box-shadow:0 2px 10px rgba(67,97,238,.25)}
.bp:hover{box-shadow:0 4px 16px rgba(67,97,238,.35);transform:translateY(-1px)}
.bp-cyan{background:linear-gradient(135deg,#06B6D4,#0891B2);box-shadow:0 2px 10px rgba(6,182,212,.25)}
.bp-purple{background:linear-gradient(135deg,#8B5CF6,#7C3AED);box-shadow:0 2px 10px rgba(139,92,246,.25)}
.bo{padding:8px 16px;border-radius:10px;border:1px solid var(--border);background:#fff;font-size:13px;font-weight:500;color:var(--text2)}
.bo:hover{background:var(--bg);border-color:var(--border2);color:var(--text)}
.bd{padding:8px 16px;border-radius:10px;border:1px solid var(--red-bg);background:var(--red-bg);font-size:13px;font-weight:600;color:var(--red)}
.bd:hover{background:rgba(239,68,68,.12)}
.bs{padding:12px 24px;border-radius:12px;border:none;background:var(--gradient2);color:#fff;font-size:14px;font-weight:700;box-shadow:0 2px 10px rgba(16,185,129,.25)}
.dp{position:fixed;right:0;top:0;bottom:0;width:min(480px,100vw);background:#fff;box-shadow:-4px 0 24px rgba(0,0,0,.08);z-index:999;display:flex;flex-direction:column;animation:sl .25s;border-left:1px solid var(--border)}
@keyframes sl{from{transform:translateX(100%)}to{transform:translateX(0)}}
.co{position:fixed;inset:0;background:rgba(30,41,59,.4);display:flex;align-items:center;justify-content:center;z-index:2000;backdrop-filter:blur(6px)}
.cb{background:#fff;border-radius:var(--radius-lg);padding:30px;width:min(400px,90vw);text-align:center;border:1px solid var(--border);box-shadow:var(--shadow-lg)}
.cb h4{font-size:16px;font-weight:700;margin-bottom:8px}
.cb p{color:var(--text2);font-size:14px;margin-bottom:20px}
.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:10px;border:1px solid var(--border);font-size:13px;font-weight:500;background:#fff}
.chip button{background:none;border:none;color:var(--text4);font-size:14px}
.chip button:hover{color:var(--red)}
.sw{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:auto;background:#fff}
.sg{display:grid;font-size:12px}
.sh{padding:12px 8px;background:var(--cyan2);color:#fff;text-align:center;font-weight:600;font-size:11px;border-bottom:1px solid var(--border)}
.sh.td{background:#7C3AED}
.st{padding:8px 4px;font-size:10px;font-weight:600;color:var(--cyan2);text-align:center;background:#fff;border-right:1px solid var(--border);border-bottom:1px solid var(--border);font-family:var(--mono)}
.sc{padding:2px 3px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);min-height:36px;background:#fff}
.sc.td{background:rgba(6,182,212,.06)}
.sch{padding:3px 6px;border-radius:6px;font-size:10px;font-weight:600;display:block;margin:1px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.sch:hover{transform:scale(1.02)}
.ht{width:100%;border-collapse:collapse;font-size:12px}
.ht th{padding:10px 4px;background:var(--accent);color:#fff;font-size:10px;font-weight:600;position:sticky;top:0;border-bottom:1px solid var(--border)}
.ht th:first-child{text-align:left;padding-left:14px;min-width:140px;position:sticky;left:0;z-index:3}
.ht th.today-th{background:#7C3AED}
.ht td{border-bottom:1px solid var(--border)}
.ht td:first-child{position:sticky;left:0;background:inherit;border-right:1px solid var(--border);padding:6px 12px}
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.meeting-time{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;background:var(--cyan-bg);color:var(--cyan2)}
.recurring-badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;background:var(--purple-bg);color:var(--purple2)}
.analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.chart-card{background:var(--card);border-radius:var(--radius-lg);border:1px solid var(--border);padding:22px}
.chart-card .chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.chart-card .chart-title{font-size:13px;font-weight:700}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:140px;padding-top:10px}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.bar-fill{width:100%;border-radius:6px 6px 0 0;transition:height .5s;min-width:20px}
.bar-label{font-size:9px;color:var(--text3);font-weight:600;text-align:center}
.bar-value{font-size:10px;font-weight:700;color:var(--text2);font-family:var(--mono)}
.donut-container{display:flex;align-items:center;justify-content:center;gap:20px}
.donut-legend{display:flex;flex-direction:column;gap:6px}
.donut-legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
.donut-legend-dot{width:10px;height:10px;border-radius:3px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border:none}
.heatmap-cell{border-radius:3px;transition:all .2s}
.heatmap-cell:hover{transform:scale(1.3);z-index:1}
.notif-tray{position:fixed;top:80px;right:20px;z-index:3000;display:flex;flex-direction:column;gap:8px;max-width:360px}
.notif{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow-lg);animation:notif-in .3s;border-left:4px solid var(--accent);display:flex;gap:10px;align-items:flex-start;cursor:pointer}
.notif:hover{transform:translateX(-4px)}
.notif.meeting{border-left-color:var(--cyan2)}
.notif.overdue{border-left-color:var(--red)}
.notif-body{flex:1;min-width:0}
.notif-title{font-weight:700;font-size:13px;margin-bottom:2px}
.notif-sub{font-size:11px;color:var(--text3)}
.notif-close{background:none;border:none;color:var(--text4);font-size:16px;padding:0;cursor:pointer;line-height:1}
.notif-close:hover{color:var(--text2)}
@keyframes notif-in{from{opacity:0;transform:translateX(20px)}to{opacity:1}}
.wd-chip{padding:8px 12px;border-radius:10px;border:1.5px solid var(--border);background:#fff;color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;user-select:none}
.wd-chip.on{background:var(--purple);color:#fff;border-color:var(--purple)}
.rec-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all .2s;border-left:3px solid var(--purple)}
.rec-card:hover{border-color:var(--purple);box-shadow:0 4px 16px rgba(139,92,246,.08);transform:translateY(-1px)}
.rec-card.paused{opacity:.5;border-left-color:var(--text4)}
@media(max-width:768px){
.hdr{padding:0 14px;gap:8px;height:auto;flex-wrap:wrap;padding:12px 14px}
.main{padding:16px 14px}
.kpi-r{grid-template-columns:repeat(2,1fr)}
.analytics-grid{grid-template-columns:1fr}
.dp{width:100vw}
}
</style>
</head>

function periodRange(p){const n=new Date();if(p==="all")return[null,null];if(p==="today"){const d=td();return[d,d]}if(p==="week"){const d=new Date(n);d.setDate(d.getDate()-7);return[d.toISOString().split("T")[0],td()]}if(p==="month"){const d=new Date(n);d.setMonth(d.getMonth()-1);return[d.toISOString().split("T")[0],td()]}if(p==="quarter"){const d=new Date(n);d.setMonth(d.getMonth()-3);return[d.toISOString().split("T")[0],td()]}if(p==="year"){const d=new Date(n);d.setFullYear(d.getFullYear()-1);return[d.toISOString().split("T")[0],td()]}return[null,null]}

function Toast({msg,type,onDone}){useEffect(()=>{const t=setTimeout(onDone,3000);return()=>clearTimeout(t)},[]);return<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:"#fff",padding:"12px 24px",borderRadius:12,fontSize:13,fontWeight:600,zIndex:4000,border:`1px solid ${type==='error'?'var(--red)':'var(--border)'}`,boxShadow:"var(--shadow-lg)",color:type==='error'?'var(--red)':'var(--text)'}}>{msg}</div>}
function DonutChart({segments,size=140,thickness=24}){const r=size/2;const cr=r-thickness/2;const circ=2*Math.PI*cr;let off=0;return<svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>{segments.map((s,i)=>{const dash=circ*s.pct/100;const gap=circ-dash;const rot=-90+off*360/100;off+=s.pct;return<circle key={i} cx={r} cy={r} r={cr} fill="none" stroke={s.color} strokeWidth={thickness} strokeDasharray={`${dash} ${gap}`} transform={`rotate(${rot} ${r} ${r})`}/>})}<text x={r} y={r-6} textAnchor="middle" fill="var(--text)" fontFamily="var(--mono)" fontSize="22" fontWeight="800">{segments.reduce((a,s)=>a+s.value,0)}</text><text x={r} y={r+12} textAnchor="middle" fill="var(--text2)" fontSize="10" fontWeight="600">ВСЕГО</text></svg>}

function KpiDrill({kpi,tasks,now,onClose,onOpenTask}){

const colors={total:"var(--accent)",done:"var(--green)",active:"var(--accent)",burn:"var(--amber)",over:"var(--red)"};

function App(){

const now=td();

const[showMForm,setShowMForm]=useState(false);
const[showRForm,setShowRForm]=useState(false);
const[editTask,setEditTask]=useState(null);
const[editRec,setEditRec]=useState(null);
const[detailTask,setDetailTask]=useState(null);
const[showSettings,setShowSettings]=useState(false);
const[filter,setFilter]=useState("active");
const[sortBy,setSortBy]=useState("deadline");
const[todaySort,setTodaySort]=useState("priority");
const[mtgSort,setMtgSort]=useState("date");
const[mtgFilter,setMtgFilter]=useState("upcoming");
const[schedDate,setSchedDate]=useState(now);
const[habMonth,setHabMonth]=useState(()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`});
const[toast,setToast]=useState(null);
const showToast=(msg,type)=>setToast({msg,type});
const[drillKpi,setDrillKpi]=useState(null);
const[panelPeriod,setPanelPeriod]=useState("all");
const[anPeriod,setAnPeriod]=useState("all");
const[anCat,setAnCat]=useState("");const[anPri,setAnPri]=useState("");
const[notifications,setNotifications]=useState([]);
const notifIds=useRef(new Set());

const reload=useCallback(async()=>{try{const raw=await callApi("get_data");const parsed=JSON.parse(raw);setData(parsed);setLoading(false)}catch(e){console.error("reload error:",e)}},[]);

useEffect(()=>{reload();
window.__onDataChanged=()=>reload();
window.__onNotifications=newItems=>{
const fresh=newItems.filter(n=>!notifIds.current.has(`${n.type}-${n.id}`));
fresh.forEach(n=>notifIds.current.add(`${n.type}-${n.id}`));
if(fresh.length)setNotifications(prev=>[...prev,...fresh]);
};
// Poll notifications manually too in case background thread is slow
const pollInterval=setInterval(async()=>{try{const res=await callApi("get_notifications");const items=JSON.parse(res||"[]");if(items.length)window.__onNotifications(items)}catch(e){}},60000);
return()=>{delete window.__onDataChanged;delete window.__onNotifications;clearInterval(pollInterval)}
},[reload]);

const closeNotif=idx=>setNotifications(p=>p.filter((_,i)=>i!==idx));
const openNotifTask=n=>{const t=data.tasks.find(x=>x.id===n.id);if(t)setDetailTask(t)};

const addT=async t=>{try{await callApi("add_task",JSON.stringify(t));await reload()}catch(e){showToast("Ошибка сохранения","error")}};
const updT=async(id,patch)=>{try{await callApi("update_task",id,JSON.stringify(patch));await reload()}catch(e){showToast("Ошибка","error")}};
const delT=async id=>{await callApi("delete_task",id);setDetailTask(null);reload()};
const setProg=async(id,p)=>{const patch=p>=100?{progress:p,completedAt:td()}:{progress:p,completedAt:null};await callApi("update_task",id,JSON.stringify(patch));if(detailTask&&detailTask.id===id)setDetailTask(prev=>({...prev,...patch}));reload()};
const saveResult=async(id,text)=>{await callApi("update_task",id,JSON.stringify({meetingResult:text}));showToast("Результат сохранён");reload()};

/* Recurring CRUD */
const addRec=async r=>{try{await callApi("add_recurring",JSON.stringify(r));showToast("Цикл создан");reload()}catch(e){showToast("Ошибка","error")}};
const updRec=async(id,r)=>{try{await callApi("update_recurring",id,JSON.stringify(r));showToast("Цикл обновлён, будущие задачи синхронизированы");reload()}catch(e){showToast("Ошибка","error")}};
const delRec=async(id,removeFuture)=>{await callApi("delete_recurring",id,!!removeFuture);showToast(removeFuture?"Цикл и будущие задачи удалены":"Цикл удалён");reload()};

/* Split tasks/meetings */
const tasksOnly=useMemo(()=>data.tasks.filter(t=>t.type!=="meeting"),[data.tasks]);
const meetings=useMemo(()=>data.tasks.filter(t=>t.type==="meeting"),[data.tasks]);

/* Panel period filter */
const[pFrom,pTo]=periodRange(panelPeriod);
const panelTasks=useMemo(()=>tasksOnly.filter(t=>inPeriod(t,pFrom,pTo)),[tasksOnly,pFrom,pTo]);
const stats=useMemo(()=>{const s={total:0,done:0,active:0,burn:0,over:0};panelTasks.forEach(t=>{if(!t.name)return;s.total++;const st=getS(t,now).l;if(st==="Выполнено")s.done++;else if(st==="В работе")s.active++;else if(st==="Горит"){s.burn++;s.active++}else if(st==="Просрочено")s.over++;else s.active++});s.pct=s.total?Math.round(s.done/s.total*100):0;return s},[panelTasks,now]);
const urgent=useMemo(()=>panelTasks.filter(t=>{const s=getS(t,now).l;return s==="Просрочено"||s==="Горит"}),[panelTasks,now]);

/* Tasks list */
const filtered=useMemo(()=>{
let l=[...tasksOnly].filter(t=>t.name);
if(filter==="active")l=l.filter(t=>getS(t,now).l!=="Выполнено");
else if(filter==="completed")l=l.filter(t=>getS(t,now).l==="Выполнено");
if(sortBy==="deadline")l.sort((a,b)=>(a.deadline||"9999").localeCompare(b.deadline||"9999"));
else if(sortBy==="priority"){const o={};data.priorities.forEach((p,i)=>o[p]=i);l.sort((a,b)=>(o[a.pri]??99)-(o[b.pri]??99)||(a.deadline||"9999").localeCompare(b.deadline||"9999"))}
else if(sortBy==="category")l.sort((a,b)=>(a.cat||"").localeCompare(b.cat||"")||(a.deadline||"9999").localeCompare(b.deadline||"9999"));
else if(sortBy==="created")l.sort((a,b)=>(b.createdAt||"").localeCompare(a.createdAt||""));
else if(sortBy==="completed")l.sort((a,b)=>(b.completedAt||"").localeCompare(a.completedAt||""));
return l
},[tasksOnly,data.priorities,filter,sortBy,now]);

/* Today */
const todayL=useMemo(()=>{
let l=tasksOnly.filter(t=>{if(!t.name)return false;const st=getS(t,now);if(st.l==="Выполнено")return false;if(!t.start||t.start>now)return false;if(st.l==="Просрочено")return true;if(!t.deadline||t.deadline>=now)return true;return false});
if(todaySort==="priority"){const o={};data.priorities.forEach((p,i)=>o[p]=i);l.sort((a,b)=>(o[a.pri]??99)-(o[b.pri]??99))}
else if(todaySort==="deadline")l.sort((a,b)=>(a.deadline||"9999").localeCompare(b.deadline||"9999"));
else if(todaySort==="category")l.sort((a,b)=>(a.cat||"").localeCompare(b.cat||""));
else if(todaySort==="created")l.sort((a,b)=>(b.createdAt||"").localeCompare(a.createdAt||""));
return l
},[tasksOnly,data.priorities,todaySort,now]);
const todayMeetings=useMemo(()=>meetings.filter(m=>{if(!m.name)return false;if(m.progress>=100)return false;if(m.start===now||m.deadline===now||(m.start&&m.start<=now&&m.deadline&&m.deadline>=now))return true;return false}).sort((a,b)=>(a.timeStart||"99:99").localeCompare(b.timeStart||"99:99")),[meetings,now]);

const getMon=d=>{const dt=new Date(d);const dw=dt.getDay();const diff=dt.getDate()-dw+(dw===0?-6:1);return new Date(dt.setDate(diff)).toISOString().split("T")[0]};
const weekD=useMemo(()=>{const m=getMon(schedDate);return Array.from({length:7},(_,i)=>{const d=new Date(m);d.setDate(d.getDate()+i);return d.toISOString().split("T")[0]})},[schedDate]);
const getMeetingsForDay=useCallback(day=>meetings.filter(m=>{if(!m.name||m.progress>=100)return false;if(m.start&&m.start<=day&&m.deadline&&m.deadline>=day)return true;if(m.start===day||m.deadline===day)return true;return false}).sort((a,b)=>(a.timeStart||"99:99").localeCompare(b.timeStart||"99:99")),[meetings]);
const daysInM=useMemo(()=>{const[y,m]=habMonth.split("-").map(Number);return new Date(y,m,0).getDate()},[habMonth]);

/* Meetings list filter */

let l=[...meetings].filter(m=>m.name);
if(mtgFilter==="upcoming")l=l.filter(m=>m.progress<100&&(!m.deadline||m.deadline>=now));
else if(mtgFilter==="past")l=l.filter(m=>m.progress>=100||(m.deadline&&m.deadline<now));
else if(mtgFilter==="today")l=l.filter(m=>m.start===now||m.deadline===now||(m.start&&m.start<=now&&m.deadline&&m.deadline>=now));
if(mtgSort==="date")l.sort((a,b)=>(a.start||"").localeCompare(b.start||"")||(a.timeStart||"").localeCompare(b.timeStart||""));
else if(mtgSort==="date-desc")l.sort((a,b)=>(b.start||"").localeCompare(a.start||"")||(b.timeStart||"").localeCompare(a.timeStart||""));
else if(mtgSort==="priority"){const o={};data.priorities.forEach((p,i)=>o[p]=i);l.sort((a,b)=>(o[a.pri]??99)-(o[b.pri]??99))}
else if(mtgSort==="created")l.sort((a,b)=>(b.createdAt||"").localeCompare(a.createdAt||""));
return l
},[meetings,mtgFilter,mtgSort,data.priorities,now]);

/* Export */
const[expFrom,setExpFrom]=useState(()=>{const d=new Date();d.setMonth(d.getMonth()-1);return d.toISOString().split("T")[0]});
const[expTo,setExpTo]=useState(td());
const[expCats,setExpCats]=useState([]);const[expPris,setExpPris]=useState([]);const[expStat,setExpStat]=useState([]);

const expMeetings=useMemo(()=>meetings.filter(m=>{if(!m.name)return false;if(m.start&&m.start>expTo)return false;if(m.deadline&&m.deadline<expFrom)return false;if(m.start&&m.start<expFrom&&m.deadline&&m.deadline<expFrom)return false;return true}),[meetings,expFrom,expTo]);

const expStats=useMemo(()=>{const s={total:expFiltered.length,done:0,active:0,overdue:0,burning:0};expFiltered.forEach(t=>{const st=getS(t,now);if(st.l==="Выполнено")s.done++;else if(st.l==="Просрочено")s.overdue++;else if(st.l==="Горит")s.burning++;else s.active++});s.pct=s.total?Math.round(s.done/s.total*100):0;s.avgProg=s.total?Math.round(expFiltered.reduce((a,t)=>a+(t.progress||0),0)/s.total):0;return s},[expFiltered,now]);

const genReport=()=>{setExpGen(true);setTimeout(()=>{

const taskRow=(t,showDeadline)=>{const st=getS(t,now);const cc=st.c==='var(--green)'?'#10B981':st.c==='var(--red)'?'#EF4444':st.c==='var(--amber)'?'#F59E0B':'#4361EE';return`<tr><td><strong>${esc(t.name)}</strong>${t.desc?'<div style="color:#64748B;font-size:11px;margin-top:2px">'+esc(t.desc)+'</div>':''}</td><td><span class="bdg" style="color:${gc(t.cat)};background:${gc(t.cat)}15">${esc(t.cat||"\u2014")}</span></td><td><span class="bdg" style="color:${gp(t.pri)};background:${gp(t.pri)}15">${esc(t.pri)}</span></td>${showDeadline?`<td>${fmt(t.deadline)}</td>`:''}<td style="color:${cc};font-weight:600">${st.i} ${st.l}</td><td><div style="display:flex;align-items:center;gap:8px"><div style="flex:1;height:8px;background:#F0F4FA;border-radius:4px;overflow:hidden;min-width:60px"><div style="width:${t.progress}%;height:100%;background:${cc}"></div></div><span style="font-family:'IBM Plex Mono';font-weight:700;font-size:11px;min-width:32px;text-align:right">${t.progress}%</span></div></td>${t.completedAt?`<td style="color:#10B981;font-weight:600">${fmt(t.completedAt)}</td>`:''}</tr>`};

<select value={todaySort} onChange={e=>setTodaySort(e.target.value)} style={{padding:"8px 12px",borderRadius:10,border:"1.5px solid var(--border)",fontSize:12,background:"var(--bg3)"}}>
<option value="priority">{Lg.by_priority}</option><option value="deadline">{Lg.by_deadline}</option><option value="category">{Lg.by_category}</option><option value="created">{Lg.by_created}</option>

{todayMeetings.map(m=><div key={m.id} className="card" style={{marginBottom:8,borderLeft:"3px solid var(--cyan2)",cursor:"pointer"}} onClick={()=>setDetailTask(m)}>

<div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>

<div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap",alignItems:"center"}}><Bdg color={gc(t.cat)}>{t.cat}</Bdg><Bdg color={st.c}>{st.i} {st.l}</Bdg></div></div>

<div style={{marginTop:12}} onClick={e=>e.stopPropagation()}><PBar value={t.progress} color={st.c} onChange={p=>setProg(t.id,p)} size={10}/></div>

{todayL.length===0&&todayMeetings.length===0&&<div style={{textAlign:"center",padding:60,color:"var(--text4)"}}><div style={{fontSize:52,marginBottom:12}}>🎉</div><div style={{fontSize:18,fontWeight:700}}>{Lg.clean_today}</div></div>}

{tab==="journal"&&(()=>{const Lg=I18N[(data.settings||{}).lang||"ru"]||I18N.ru;return<>

<button className="bo" style={{padding:"6px 12px"}} onClick={()=>{const[y,m]=habMonth.split("-").map(Number);const d=new Date(y,m-2,1);setHabMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`)}} >←</button>
<input type="month" value={habMonth} onChange={e=>setHabMonth(e.target.value)} style={{padding:"8px 12px",borderRadius:10,border:"1.5px solid var(--border)",fontSize:13,fontWeight:600,background:"var(--bg3)"}}/>
<button className="bo" style={{padding:"6px 12px"}} onClick={()=>{const[y,m]=habMonth.split("-").map(Number);const d=new Date(y,m,1);setHabMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`)}} >→</button>
<span style={{fontWeight:700,fontSize:16}}>{monthN[parseInt(habMonth.split("-")[1])]} {habMonth.split("-")[0]}</span>
<span style={{fontSize:12,color:"var(--text4)",marginLeft:8}}>{tasksOnly.filter(t=>t.completedAt&&t.completedAt.startsWith(habMonth)).length} {Lg.completed_tasks_month}</span>

{Array.from({length:daysInM},(_,i)=>{const dk=`${habMonth}-${String(i+1).padStart(2,"0")}`;return<th key={i} className={dk===now?"today-th":""} style={{minWidth:30}}>{i+1}</th>})}</tr></thead>

if(!completed.length)return<tr><td colSpan={daysInM+2} style={{textAlign:"center",padding:50,color:"var(--text4)"}}>📓 {Lg.no_completed_month}</td></tr>;
return completed.map((t,i)=><tr key={t.id||i} style={{background:i%2===0?"#FFFFFF":"var(--bg)",cursor:"pointer"}} onClick={()=>setDetailTask(t)}>
<td><div style={{fontWeight:600,fontSize:12}}>{t.name}</div></td><td style={{textAlign:"center"}}><Bdg color={gc(t.cat)}>{t.cat}</Bdg></td>
{Array.from({length:daysInM},(_,di)=>{const dk=`${habMonth}-${String(di+1).padStart(2,"0")}`;return<td key={di} style={{textAlign:"center",padding:2}}>{t.completedAt===dk&&<span style={{display:"inline-flex",width:28,height:28,borderRadius:8,background:"var(--gradient2)",color:"#fff",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700}}>✓</span>}</td>})}
</tr>)})()}</tbody></table></div>

{/* ═══ АНАЛИТИКА ═══ */}
{tab==="analytics"&&(()=>{
const cfg=data.settings||{};const L=I18N[cfg.lang||"ru"]||I18N.ru;
const anFiltered=tasksOnly.filter(t=>{if(!t.name)return false;if(anCat&&t.cat!==anCat)return false;if(anPri&&t.pri!==anPri)return false;const[f,to]=periodRange(anPeriod);return inPeriod(t,f,to)});
const anS={total:0,done:0,active:0,burn:0,over:0,newT:0};
anFiltered.forEach(t=>{anS.total++;const st=getS(t,now).l;if(st==="Выполнено")anS.done++;else if(st==="Просрочено")anS.over++;else if(st==="Горит")anS.burn++;else if(st==="В работе")anS.active++;else anS.newT++;});
const anPct=anS.total?Math.round(anS.done/anS.total*100):0;
const anAvg=anS.total?Math.round(anFiltered.reduce((a,t)=>a+(t.progress||0),0)/anS.total):0;
const segs=[{label:L.done,value:anS.done,color:"#10B981"},{label:L.active,value:anS.active,color:"#4361EE"},{label:L.burning,value:anS.burn,color:"#F59E0B"},{label:L.overdue,value:anS.over,color:"#EF4444"},{label:L.new_task,value:anS.newT,color:"#94A3B8"}].filter(s=>s.value>0).map(s=>({...s,pct:anS.total?s.value/anS.total*100:0}));

/* On-time & avg-time metrics */
const onTimeRate=(()=>{const c=anFiltered.filter(t=>t.completedAt);if(!c.length)return null;return Math.round(c.filter(t=>!t.deadline||t.completedAt<=t.deadline).length/c.length*100)})();
const avgTime=(()=>{const d=anFiltered.filter(t=>t.completedAt&&t.start);if(!d.length)return null;return Math.round(d.reduce((s,t)=>s+Math.max(0,diffD(t.completedAt,t.start)),0)/d.length*10)/10})();

/* 12-week heatmap of completions */
const heatmap=[];
for(let w=11;w>=0;w--){const week=[];for(let day=0;day<7;day++){const dt=new Date();dt.setDate(dt.getDate()-w*7-day);const ds=dt.toISOString().split("T")[0];week.push({date:ds,count:tasksOnly.filter(t=>t.completedAt===ds).length})}heatmap.push(week)}
const maxHeat=Math.max(...heatmap.flat().map(c=>c.count),1);

/* 14-day activity timeline */
const timeline=[];
for(let i=13;i>=0;i--){const dt=new Date();dt.setDate(dt.getDate()-i);const ds=dt.toISOString().split("T")[0];timeline.push({day:ds,created:tasksOnly.filter(t=>t.createdAt&&t.createdAt.startsWith(ds)).length,completed:tasksOnly.filter(t=>t.completedAt===ds).length})}
const maxTL=Math.max(...timeline.map(d=>Math.max(d.created,d.completed)),1);

/* Upcoming 7 days */
const upcoming=tasksOnly.filter(t=>{const st=getS(t,now).l;if(st==="Выполнено")return false;if(!t.deadline)return false;const dl=diffD(t.deadline,now);return dl>=0&&dl<=7}).sort((a,b)=>(a.deadline||"").localeCompare(b.deadline||""));

/* Weekday activity — which weekdays are most productive */
const weekdayStats={};for(let i=0;i<7;i++)weekdayStats[i]={created:0,completed:0};
tasksOnly.forEach(t=>{if(t.createdAt){const d=new Date(t.createdAt);weekdayStats[(d.getDay()+6)%7].created++}if(t.completedAt){const d=new Date(t.completedAt);weekdayStats[(d.getDay()+6)%7].completed++}});
const maxWdStat=Math.max(...Object.values(weekdayStats).map(s=>Math.max(s.created,s.completed)),1);

/* Category efficiency: done % per category */
const catEff=data.categories.map(c=>{
const tc=anFiltered.filter(t=>t.cat===c);
const done=tc.filter(t=>getS(t,now).l==="Выполнено").length;
return{cat:c,total:tc.length,done,pct:tc.length?Math.round(done/tc.length*100):0};
}).filter(c=>c.total>0).sort((a,b)=>b.pct-a.pct);

/* Priority efficiency */
const priEff=data.priorities.map(p=>{
const tc=anFiltered.filter(t=>t.pri===p);
const done=tc.filter(t=>getS(t,now).l==="Выполнено").length;
const overdue=tc.filter(t=>getS(t,now).l==="Просрочено").length;
return{pri:p,total:tc.length,done,overdue,pct:tc.length?Math.round(done/tc.length*100):0};
}).filter(p=>p.total>0);

/* Category × priority matrix */
const catPriMatrix={};
data.categories.forEach(c=>{catPriMatrix[c]={};data.priorities.forEach(p=>{catPriMatrix[c][p]=anFiltered.filter(t=>t.cat===c&&t.pri===p).length})});

/* Performance trend: compare first half vs second half of period */
const trend=(()=>{
const completed=anFiltered.filter(t=>t.completedAt).sort((a,b)=>a.completedAt.localeCompare(b.completedAt));
if(completed.length<4)return null;
const mid=Math.floor(completed.length/2);
const firstHalf=completed.slice(0,mid).length;
const secondHalf=completed.slice(mid).length;
if(secondHalf>firstHalf*1.2)return{icon:"📈",label:L.improving,color:"var(--green)"};
if(secondHalf<firstHalf*0.8)return{icon:"📉",label:L.declining,color:"var(--red)"};
return{icon:"➡️",label:L.stable,color:"var(--amber)"};
})();

/* Busiest day (by # tasks due or created) */
const dayLoad={};
anFiltered.forEach(t=>{if(t.deadline){dayLoad[t.deadline]=(dayLoad[t.deadline]||0)+1}});
const busyDays=Object.entries(dayLoad).sort((a,b)=>b[1]-a[1]);
const busiestDay=busyDays[0];

/* Month activity: last 6 months */
const monthActivity=[];
for(let i=5;i>=0;i--){const dt=new Date();dt.setMonth(dt.getMonth()-i);const mk=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}`;
const created=tasksOnly.filter(t=>t.createdAt&&t.createdAt.startsWith(mk)).length;
const completed=tasksOnly.filter(t=>t.completedAt&&t.completedAt.startsWith(mk)).length;
monthActivity.push({month:mk,label:monthN[dt.getMonth()+1].slice(0,3),created,completed})}
const maxMonth=Math.max(...monthActivity.map(m=>Math.max(m.created,m.completed)),1);

/* Meetings analytics */
const mtgStats={
total:meetings.length,
conducted:meetings.filter(m=>m.progress>=100).length,
withResult:meetings.filter(m=>m.meetingResult&&m.meetingResult.trim()).length,
upcoming:meetings.filter(m=>m.progress<100&&m.start&&m.start>now).length,
};
const mtgResultRate=mtgStats.conducted?Math.round(mtgStats.withResult/mtgStats.conducted*100):0;

return<div>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:12}}>
<div><div style={{fontSize:22,fontWeight:800}}>📈 {L.analytics}</div><div style={{color:"var(--text3)",fontSize:13,marginTop:2}}>{anFiltered.length} {L.in_sample}</div></div>
<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
<div className="seg">{[["all",L.all_time],["week",L.week],["month",L.month],["quarter",L.quarter],["year",L.year]].map(([k,l])=><button key={k} className={anPeriod===k?"on":""} onClick={()=>setAnPeriod(k)}>{l}</button>)}</div>
<select value={anCat} onChange={e=>setAnCat(e.target.value)} style={{padding:"8px 12px",borderRadius:10,border:"1.5px solid var(--border)",fontSize:12,background:"#fff"}}><option value="">{L.all_cats}</option>{data.categories.map(c=><option key={c}>{c}</option>)}</select>
<select value={anPri} onChange={e=>setAnPri(e.target.value)} style={{padding:"8px 12px",borderRadius:10,border:"1.5px solid var(--border)",fontSize:12,background:"#fff"}}><option value="">{L.all_pris}</option>{data.priorities.map(p=><option key={p}>{p}</option>)}</select>
</div></div>

{/* Top KPI row — 6 boxes */}
<div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:12,marginBottom:20}}>
<KPI label={L.total} value={anS.total} sub={L.tasks} color="var(--accent)"/>
<KPI label={L.done} value={`${anPct}%`} sub={`${anS.done} ${L.tasks}`} color="var(--green)"/>
<KPI label={L.avg_progress} value={`${anAvg}%`} sub={L.avg_progress} color="var(--amber)"/>
<KPI label={L.overdue} value={anS.over} sub={L.tasks} color="var(--red)"/>
<KPI label={L.on_time} value={onTimeRate!==null?`${onTimeRate}%`:"—"} sub={L.from_completed} color="var(--cyan2)"/>
<KPI label={L.avg_time} value={avgTime!==null?avgTime:"—"} sub={L.days} color="#DB2777"/>
</div>

{/* Quick stats panel — meetings + trend */}
<div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
<div className="kpi"><div className="kpi-glow" style={{background:"var(--cyan)"}}/><div className="kpi-l">{L.total_meetings}</div><div className="kpi-v" style={{color:"var(--cyan2)"}}>{mtgStats.total}</div><div className="kpi-s">{mtgStats.conducted} {L.done.toLowerCase()}</div></div>
<div className="kpi"><div className="kpi-glow" style={{background:"var(--green)"}}/><div className="kpi-l">{L.meetings} {L.with_result||"с результатом"}</div><div className="kpi-v" style={{color:"var(--green)"}}>{mtgResultRate}%</div><div className="kpi-s">{mtgStats.withResult} / {mtgStats.conducted}</div></div>
<div className="kpi"><div className="kpi-glow" style={{background:"var(--accent)"}}/><div className="kpi-l">{L.total_cycles}</div><div className="kpi-v" style={{color:"var(--accent)"}}>{data.recurring.filter(r=>r.active).length}</div><div className="kpi-s">{data.recurring.length} {L.total.toLowerCase()}</div></div>
<div className="kpi"><div className="kpi-glow" style={{background:trend?trend.color:"var(--text4)"}}/><div className="kpi-l">{L.performance_trend}</div><div className="kpi-v" style={{color:trend?trend.color:"var(--text3)",fontSize:22}}>{trend?trend.icon:"—"}</div><div className="kpi-s">{trend?trend.label:L.no_data}</div></div>
</div>

<div className="analytics-grid">
{/* Status donut */}
<div className="chart-card"><div className="chart-title" style={{fontWeight:700,marginBottom:16}}>📊 {L.status_chart}</div>
{segs.length?<div className="donut-container"><DonutChart segments={segs} size={150} thickness={26}/>
<div className="donut-legend">{segs.map(s=><div key={s.label} className="donut-legend-item"><div className="donut-legend-dot" style={{background:s.color}}/><span>{s.label}</span><span style={{fontFamily:"var(--mono)",fontWeight:700,marginLeft:"auto",paddingLeft:12}}>{s.value} ({Math.round(s.pct)}%)</span></div>)}</div></div>:<div style={{textAlign:"center",padding:30,color:"var(--text4)"}}>{L.no_data}</div>}
</div>

{/* Categories bar chart */}
<div className="chart-card"><div className="chart-title" style={{fontWeight:700,marginBottom:16}}>🏷️ {L.cat_chart}</div>
{(()=>{const cd={};anFiltered.forEach(t=>{cd[t.cat||"—"]=(cd[t.cat||"—"]||0)+1});const entries=Object.entries(cd).sort((a,b)=>b[1]-a[1]);const mx=Math.max(...entries.map(e=>e[1]),1);
return entries.length?<div className="bar-chart">{entries.map(([c,n])=><div key={c} className="bar-col"><div className="bar-value">{n}</div><div className="bar-fill" style={{height:`${(n/mx)*100}%`,background:gc(c),minHeight:4}}/><div className="bar-label">{c}</div></div>)}</div>:<div style={{textAlign:"center",padding:30,color:"var(--text4)"}}>{L.no_data}</div>})()}
</div>

{/* Priority bars */}
<div className="chart-card"><div className="chart-title" style={{fontWeight:700,marginBottom:16}}>🎯 {L.pri_chart}</div>
{data.priorities.map(p=>{const c=anFiltered.filter(t=>t.pri===p).length;const tot=anFiltered.length||1;return<div key={p} style={{marginBottom:12}}>
<div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:12,fontWeight:600,color:gp(p)}}>{p}</span><span style={{fontSize:12,fontWeight:700,fontFamily:"var(--mono)"}}>{c} ({Math.round(c/tot*100)}%)</span></div>
<div style={{width:"100%",height:10,background:"var(--bg4)",borderRadius:6,overflow:"hidden"}}><div style={{width:`${(c/tot)*100}%`,height:"100%",background:gp(p),borderRadius:6,transition:"width .5s"}}/></div>
</div>})}
</div>

{/* Productivity stats */}
<div className="chart-card"><div className="chart-title" style={{fontWeight:700,marginBottom:16}}>⚡ {L.productivity}</div>
<div className="stat-row"><span style={{color:"var(--text2)"}}>{L.total}</span><span style={{fontWeight:700,fontFamily:"var(--mono)"}}>{anS.total}</span></div>
<div className="stat-row"><span style={{color:"var(--text2)"}}>{L.done}</span><span style={{fontWeight:700,fontFamily:"var(--mono)",color:"var(--green)"}}>{anS.done}</span></div>
<div className="stat-row"><span style={{color:"var(--text2)"}}>{L.active}</span><span style={{fontWeight:700,fontFamily:"var(--mono)",color:"var(--accent)"}}>{anS.active}</span></div>
<div className="stat-row"><span style={{color:"var(--text2)"}}>{L.burning}</span><span style={{fontWeight:700,fontFamily:"var(--mono)",color:"var(--amber)"}}>{anS.burn}</span></div>
<div className="stat-row"><span style={{color:"var(--text2)"}}>{L.overdue}</span><span style={{fontWeight:700,fontFamily:"var(--mono)",color:"var(--red)"}}>{anS.over}</span></div>
<div className="stat-row"><span style={{color:"var(--text2)"}}>{L.coef_completion}</span><span style={{fontWeight:700,fontFamily:"var(--mono)",color:"var(--accent)"}}>{anPct}%</span></div>
</div>

{/* 14-day timeline */}
<div className="chart-card" style={{gridColumn:"1/-1"}}><div className="chart-title" style={{fontWeight:700,marginBottom:16}}>📅 {L.timeline_14d}</div>
<div className="bar-chart" style={{height:140}}>
{timeline.map(d=><div key={d.day} className="bar-col">
<div className="bar-value" style={{fontSize:9}}>{d.created||d.completed?`+${d.created}/✓${d.completed}`:""}</div>
<div style={{display:"flex",gap:2,alignItems:"flex-end",width:"100%",height:"100%"}}>
<div style={{flex:1,height:`${(d.created/maxTL)*100}%`,background:"var(--accent)",borderRadius:"4px 4px 0 0",minHeight:d.created?4:0}}/>
<div style={{flex:1,height:`${(d.completed/maxTL)*100}%`,background:"var(--green)",borderRadius:"4px 4px 0 0",minHeight:d.completed?4:0}}/>
</div>
<div className="bar-label" style={{fontSize:8}}>{fmtS(d.day)}</div>
</div>)}
</div>
<div style={{display:"flex",gap:16,justifyContent:"center",marginTop:10}}>
<div style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:"var(--text3)"}}><div style={{width:10,height:10,borderRadius:3,background:"var(--accent)"}}/> {L.created_label}</div>
<div style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:"var(--text3)"}}><div style={{width:10,height:10,borderRadius:3,background:"var(--green)"}}/> {L.completed_label}</div>
</div></div>

{/* Heatmap 12 weeks */}
<div className="chart-card" style={{gridColumn:"1/-1"}}><div className="chart-title" style={{fontWeight:700,marginBottom:16}}>🔥 {L.heatmap_12w}</div>
<div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
<div style={{display:"flex",flexDirection:"column",gap:3,paddingTop:2}}>
{dayN.map(d=><div key={d} style={{height:18,fontSize:9,color:"var(--text4)",display:"flex",alignItems:"center"}}>{d}</div>)}
</div>
<div style={{display:"grid",gridTemplateColumns:`repeat(${heatmap.length},1fr)`,gap:3,flex:1}}>
{heatmap.map((week,wi)=><div key={wi} style={{display:"flex",flexDirection:"column",gap:3}}>
{week.map((cell,di)=>{const intensity=cell.count/maxHeat;return<div key={di} className="heatmap-cell" title={`${fmt(cell.date)}: ${cell.count}`} style={{height:18,background:cell.count===0?"var(--bg4)":`rgba(16,185,129,${Math.max(.15,intensity)})`,borderRadius:3}}/>})}
</div>)}
</div></div>
<div style={{display:"flex",gap:4,alignItems:"center",justifyContent:"flex-end",marginTop:8}}>
<span style={{fontSize:9,color:"var(--text4)"}}>{L.less}</span>
{[0,.25,.5,.8].map((o,i)=><div key={i} style={{width:14,height:14,borderRadius:3,background:o===0?"var(--bg4)":`rgba(16,185,129,${o})`}}/>)}
<span style={{fontSize:9,color:"var(--text4)"}}>{L.more}</span>
</div></div>

{/* Weekday activity */}
<div className="chart-card"><div className="chart-title" style={{fontWeight:700,marginBottom:16}}>📅 {L.weekday_activity}</div>
<div className="bar-chart" style={{height:130}}>
{[0,1,2,3,4,5,6].map(wd=><div key={wd} className="bar-col">
<div className="bar-value" style={{fontSize:9}}>{weekdayStats[wd].created||weekdayStats[wd].completed?`+${weekdayStats[wd].created}/✓${weekdayStats[wd].completed}`:""}</div>
<div style={{display:"flex",gap:2,alignItems:"flex-end",width:"100%",height:"100%"}}>
<div style={{flex:1,height:`${(weekdayStats[wd].created/maxWdStat)*100}%`,background:"var(--accent)",borderRadius:"4px 4px 0 0",minHeight:weekdayStats[wd].created?4:0}}/>
<div style={{flex:1,height:`${(weekdayStats[wd].completed/maxWdStat)*100}%`,background:"var(--green)",borderRadius:"4px 4px 0 0",minHeight:weekdayStats[wd].completed?4:0}}/>
</div>
<div className="bar-label">{dayN[wd]}</div>
</div>)}
</div></div>

{/* 6 months activity */}
<div className="chart-card"><div className="chart-title" style={{fontWeight:700,marginBottom:16}}>📊 {L.month_activity}</div>
<div className="bar-chart" style={{height:130}}>
{monthActivity.map(m=><div key={m.month} className="bar-col">
<div className="bar-value" style={{fontSize:9}}>{m.created||m.completed?`+${m.created}/✓${m.completed}`:""}</div>
<div style={{display:"flex",gap:2,alignItems:"flex-end",width:"100%",height:"100%"}}>
<div style={{flex:1,height:`${(m.created/maxMonth)*100}%`,background:"var(--accent)",borderRadius:"4px 4px 0 0",minHeight:m.created?4:0}}/>
<div style={{flex:1,height:`${(m.completed/maxMonth)*100}%`,background:"var(--green)",borderRadius:"4px 4px 0 0",minHeight:m.completed?4:0}}/>
</div>
<div className="bar-label">{m.label}</div>
</div>)}
</div></div>

{/* Category efficiency */}
{catEff.length>0&&<div className="chart-card"><div className="chart-title" style={{fontWeight:700,marginBottom:16}}>🏆 {L.category_efficiency}</div>
{catEff.map(c=><div key={c.cat} style={{marginBottom:10}}>
<div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
<span style={{fontSize:12,fontWeight:600,color:gc(c.cat)}}>{c.cat}</span>
<span style={{fontSize:12,fontWeight:700,fontFamily:"var(--mono)",color:c.pct>=70?"var(--green)":c.pct>=40?"var(--amber)":"var(--red)"}}>{c.pct}% ({c.done}/{c.total})</span>
</div>
<div style={{width:"100%",height:8,background:"var(--bg4)",borderRadius:4,overflow:"hidden"}}><div style={{width:`${c.pct}%`,height:"100%",background:gc(c.cat),borderRadius:4}}/></div>
</div>)}
</div>}

{/* Priority efficiency with overdue breakdown */}
{priEff.length>0&&<div className="chart-card"><div className="chart-title" style={{fontWeight:700,marginBottom:16}}>⚠️ {L.priority_efficiency}</div>
{priEff.map(p=><div key={p.pri} style={{marginBottom:14,padding:10,background:"var(--bg)",borderRadius:8,borderLeft:`3px solid ${gp(p.pri)}`}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
<span style={{fontSize:13,fontWeight:700,color:gp(p.pri)}}>{p.pri}</span>
<span style={{fontSize:12,fontFamily:"var(--mono)",color:"var(--text3)"}}>{p.total} {L.tasks}</span>
</div>
<div style={{display:"flex",gap:8,fontSize:11,color:"var(--text3)"}}>
<span style={{color:"var(--green)"}}>✓ {p.done} ({p.pct}%)</span>
{p.overdue>0&&<span style={{color:"var(--red)"}}>⚠ {p.overdue}</span>}
</div>
</div>)}
</div>}

{/* Category × Priority matrix */}
<div className="chart-card" style={{gridColumn:"1/-1"}}><div className="chart-title" style={{fontWeight:700,marginBottom:16}}>🔢 {L.cat_pri_matrix}</div>
<div style={{overflowX:"auto"}}>
<table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
<thead><tr>
<th style={{padding:"8px",textAlign:"left",fontWeight:700,fontSize:11,color:"var(--text3)"}}>{L.category} / {L.priority}</th>
{data.priorities.map(p=><th key={p} style={{padding:"8px",fontSize:11,color:gp(p),fontWeight:700}}>{p}</th>)}
<th style={{padding:"8px",fontSize:11,color:"var(--text3)",fontWeight:700}}>Σ</th>
</tr></thead>
<tbody>
{data.categories.filter(c=>Object.values(catPriMatrix[c]||{}).some(n=>n>0)).map(c=>{
const rowTotal=data.priorities.reduce((a,p)=>a+(catPriMatrix[c]?.[p]||0),0);
return<tr key={c} style={{borderTop:"1px solid var(--border)"}}>
<td style={{padding:"8px",fontWeight:600,color:gc(c)}}>{c}</td>
{data.priorities.map(p=>{const v=catPriMatrix[c]?.[p]||0;return<td key={p} style={{padding:"8px",textAlign:"center",fontFamily:"var(--mono)",fontWeight:v?600:400,color:v?gp(p):"var(--text4)",background:v?gp(p)+"10":"transparent"}}>{v}</td>})}
<td style={{padding:"8px",textAlign:"center",fontFamily:"var(--mono)",fontWeight:700}}>{rowTotal}</td>
</tr>})}
</tbody>
</table>
</div>
</div>

{/* Busiest/quietest days */}
{busiestDay&&<div className="chart-card"><div className="chart-title" style={{fontWeight:700,marginBottom:16}}>📊 {L.busiest_day}</div>
<div style={{padding:"20px 0",textAlign:"center"}}>
<div style={{fontSize:32,fontWeight:800,fontFamily:"var(--mono)",color:"var(--red)"}}>{fmt(busiestDay[0])}</div>
<div style={{fontSize:14,color:"var(--text2)",marginTop:4}}>{busiestDay[1]} {L.tasks}</div>
</div>
<div style={{marginTop:10,paddingTop:10,borderTop:"1px solid var(--border)",fontSize:12,color:"var(--text3)"}}>
{L.quietest_day}: <strong style={{color:"var(--green)"}}>{busyDays.length>1?fmt(busyDays[busyDays.length-1][0]):"—"}</strong>
</div>
</div>}

{/* Speed gauge */}
<div className="chart-card"><div className="chart-title" style={{fontWeight:700,marginBottom:16}}>⏱ {L.speed}</div>
<div style={{textAlign:"center",padding:"20px 0"}}>
<div style={{fontSize:48,fontWeight:800,fontFamily:"var(--mono)",color:avgTime!==null?(avgTime<=3?"var(--green)":avgTime<=7?"var(--amber)":"var(--red)"):"var(--text4)"}}>{avgTime!==null?avgTime:"—"}</div>
<div style={{fontSize:12,color:"var(--text3)",marginTop:4}}>{L.days_per_task}</div>
<div style={{marginTop:20,padding:12,background:"var(--bg)",borderRadius:10,fontSize:12,color:"var(--text2)",lineHeight:1.6}}>
{avgTime===null?L.no_complete_tasks:avgTime<=3?L.excellent_speed:avgTime<=7?L.normal_speed:L.slow_speed}
</div></div></div>

{/* On-time gauge */}
<div className="chart-card"><div className="chart-title" style={{fontWeight:700,marginBottom:16}}>🎯 {L.punctuality}</div>
<div style={{textAlign:"center",padding:"20px 0"}}>
<div style={{fontSize:48,fontWeight:800,fontFamily:"var(--mono)",color:onTimeRate!==null?(onTimeRate>=80?"var(--green)":onTimeRate>=50?"var(--amber)":"var(--red)"):"var(--text4)"}}>{onTimeRate!==null?onTimeRate+"%":"—"}</div>
<div style={{fontSize:12,color:"var(--text3)",marginTop:4}}>{L.tasks_in_time}</div>
<div style={{marginTop:20,padding:12,background:"var(--bg)",borderRadius:10,fontSize:12,color:"var(--text2)",lineHeight:1.6}}>
{onTimeRate===null?L.no_completions:onTimeRate>=80?L.excellent_discipline:onTimeRate>=50?L.room_to_grow:L.missing_deadlines}
</div></div></div>

{/* Upcoming 7 days */}
<div className="chart-card" style={{gridColumn:"1/-1"}}>
<div className="chart-title" style={{fontWeight:700,marginBottom:16}}>⏰ {L.upcoming_7d}</div>
{upcoming.length?<div style={{display:"flex",flexDirection:"column",gap:6}}>
{upcoming.map(t=>{const st=getS(t,now);const dl=diffD(t.deadline,now);return<div key={t.id} className="tr" onClick={()=>setDetailTask(t)}>
<div className="task-left" style={{background:gp(t.pri)}}/>
<div style={{flex:1,minWidth:0}}><div style={{fontWeight:600,fontSize:14}}>{t.name}</div>
<div style={{display:"flex",gap:5,marginTop:5,flexWrap:"wrap",alignItems:"center"}}><Bdg color={gc(t.cat)}>{t.cat}</Bdg><Bdg color={gp(t.pri)} bg={gb(t.pri)}>{t.pri}</Bdg><span style={{fontSize:11,color:dl===0?"var(--red)":dl<=2?"var(--amber)":"var(--text3)"}}>📅 {fmt(t.deadline)} · {dl===0?L.today_period:`${L.in_days} ${dl} ${L.d_suffix}.`}</span></div></div>
<div style={{textAlign:"right",flexShrink:0}}><Bdg color={st.c}>{st.i} {st.l}</Bdg><div style={{fontSize:13,fontWeight:700,color:st.c,fontFamily:"var(--mono)",marginTop:3}}>{t.progress}%</div></div>
</div>})}
</div>:<div style={{textAlign:"center",padding:30,color:"var(--text4)"}}>{L.no_urgent}</div>}
</div>

</div></div>})()}

{/* ═══ ЭКСПОРТ ═══ */}
{tab==="export"&&(()=>{const Lg=I18N[(data.settings||{}).lang||"ru"]||I18N.ru;return<div>
<div style={{fontSize:22,fontWeight:800,marginBottom:6}}>📄 {Lg.report_title}</div>
<div style={{color:"var(--text3)",fontSize:13,marginBottom:20}}>{Lg.report_subtitle}</div>
<div style={{display:"grid",gridTemplateColumns:"340px 1fr",gap:20}} className="two-col">
<div className="card" style={{alignSelf:"flex-start"}}>
<div className="stitle"><span className="stitle-icon">🔍</span> {Lg.params_label}</div>
<div style={{marginBottom:16}}><div className="fl"><label>{Lg.period_from}</label><input type="date" value={expFrom} onChange={e=>setExpFrom(e.target.value)}/></div></div>
<div style={{marginBottom:16}}><div className="fl"><label>{Lg.period_to}</label><input type="date" value={expTo} onChange={e=>setExpTo(e.target.value)}/></div></div>
<div style={{marginBottom:16}}><label style={{fontSize:11,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".6px",marginBottom:6,display:"block"}}>{Lg.categories_label}</label>
<div style={{display:"flex",flexWrap:"wrap",gap:4}}>{data.categories.map(c=><button key={c} onClick={()=>toggleA(expCats,setExpCats,c)} style={{padding:"4px 10px",borderRadius:8,border:`1px solid ${expCats.includes(c)?gc(c):"var(--border)"}`,background:expCats.includes(c)?gc(c)+"15":"#fff",color:expCats.includes(c)?gc(c):"var(--text3)",fontSize:11,fontWeight:600,cursor:"pointer"}}>{c}</button>)}</div></div>
<div style={{marginBottom:16}}><label style={{fontSize:11,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".6px",marginBottom:6,display:"block"}}>{Lg.priorities_label}</label>
<div style={{display:"flex",flexWrap:"wrap",gap:4}}>{data.priorities.map(p=><button key={p} onClick={()=>toggleA(expPris,setExpPris,p)} style={{padding:"4px 10px",borderRadius:8,border:`1px solid ${expPris.includes(p)?gp(p):"var(--border)"}`,background:expPris.includes(p)?gp(p)+"15":"#fff",color:expPris.includes(p)?gp(p):"var(--text3)",fontSize:11,fontWeight:600,cursor:"pointer"}}>{p}</button>)}</div></div>
<div style={{marginBottom:20}}><label style={{fontSize:11,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".6px",marginBottom:6,display:"block"}}>{Lg.chart_status}</label>
<div style={{display:"flex",flexWrap:"wrap",gap:4}}>{statuses.map(s=><button key={s} onClick={()=>toggleA(expStat,setExpStat,s)} style={{padding:"4px 10px",borderRadius:8,border:`1px solid ${expStat.includes(s)?"var(--accent)":"var(--border)"}`,background:expStat.includes(s)?"var(--accent-bg)":"#fff",color:expStat.includes(s)?"var(--accent)":"var(--text3)",fontSize:11,fontWeight:600,cursor:"pointer"}}>{s}</button>)}</div></div>
<div style={{marginBottom:16}}><label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13}}><input type="checkbox" checked={expIncMeetings} onChange={e=>setExpIncMeetings(e.target.checked)} style={{width:18,height:18,accentColor:"var(--cyan2)"}}/> {Lg.include_meetings_export}</label></div>
<div style={{background:"var(--bg)",borderRadius:10,padding:12,marginBottom:16}}>
<div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}><span style={{color:"var(--text3)"}}>{Lg.tasks}:</span><span style={{fontWeight:700,fontFamily:"var(--mono)"}}>{expFiltered.length}</span></div>
{expIncMeetings&&<div style={{display:"flex",justifyContent:"space-between",fontSize:12}}><span style={{color:"var(--text3)"}}>{Lg.meetings}:</span><span style={{fontWeight:700,fontFamily:"var(--mono)",color:"var(--cyan2)"}}>{expMeetings.length}</span></div>}
</div>
<button className="bp" onClick={genReport} disabled={expGen||(!expFiltered.length&&!expMeetings.length)} style={{opacity:(expFiltered.length||expMeetings.length)?1:.5}}>{expGen?`⏳ ${Lg.generating}`:`📄 ${Lg.generate_report}`}</button>
</div>
<div>{!expPreview?<div className="card" style={{textAlign:"center",padding:60}}><div style={{fontSize:48,marginBottom:12}}>📋</div><div style={{fontWeight:700,fontSize:16}}>{Lg.preview}</div><div style={{color:"var(--text3)",fontSize:13}}>{Lg.preview_hint}</div></div>
:<div><div style={{display:"flex",gap:8,marginBottom:12}}><button className="bp" onClick={printReport} style={{width:"auto",padding:"10px 24px"}}>🖨️ {Lg.print_pdf}</button><button className="bo" onClick={()=>setExpPreview(null)}>{Lg.reset}</button></div>
<div className="card" style={{padding:0,overflow:"hidden"}}><iframe srcDoc={expPreview} style={{width:"100%",height:"calc(100vh - 200px)",border:"none",borderRadius:16}} title="report"/></div></div>}</div>
</div></div>})()}

{/* ═══ НАСТРОЙКИ ═══ */}
{tab==="settings"&&<SettingsPage settings={data.settings||{}} onSave={async s=>{await callApi("save_settings",JSON.stringify(s));reload()}} onReset={async()=>{await callApi("reset_settings");reload()}} showToast={showToast} data={data} onUpdate={reload} lang={(data.settings||{}).lang||"ru"}/>}

</div>

{showForm&&<TForm lang={(data.settings||{}).lang||"ru"} onClose={()=>{setShowForm(false);setEditTask(null)}} initial={editTask} cats={data.categories} pris={data.priorities} onSubmit={t=>{if(editTask)updT(editTask.id,t);else addT(t)}}/>}
{showMForm&&<MForm lang={(data.settings||{}).lang||"ru"} onClose={()=>{setShowMForm(false);setEditTask(null)}} initial={editTask} pris={data.priorities} onSubmit={t=>{if(editTask)updT(editTask.id,t);else addT(t)}}/>}
{showRForm&&<RForm lang={(data.settings||{}).lang||"ru"} onClose={()=>{setShowRForm(false);setEditRec(null)}} initial={editRec} cats={data.categories} pris={data.priorities} onSubmit={async r=>{if(editRec){await callApi("update_recurring",editRec.id,JSON.stringify(r))}else{await callApi("add_recurring",JSON.stringify(r))}reload()}}/>}
{detailTask&&<TDetail task={data.tasks.find(x=>x.id===detailTask.id)||detailTask} onClose={()=>setDetailTask(null)} now={now} lang={(data.settings||{}).lang||"ru"} onEdit={t=>{setDetailTask(null);setEditTask(t);if(t.type==="meeting")setShowMForm(true);else setShowForm(true)}} onDelete={delT} onProg={setProg} onSaveResult={async(id,text)=>{await callApi("update_task",id,JSON.stringify({meetingResult:text}));reload()}} onSaveTaskResult={async(id,text)=>{await callApi("update_task",id,JSON.stringify({taskResult:text}));reload()}}/>}
{toast&&<Toast msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
{drillKpi&&<KpiDrill kpi={drillKpi} tasks={panelTasks} now={now} onClose={()=>setDrillKpi(null)} onOpenTask={t=>setDetailTask(t)}/>}
</div>}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
